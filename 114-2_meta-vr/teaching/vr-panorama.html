document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html lang=\"zh-Hant\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>VR 影片後期製作：從展開圖到球體內觀看<\u002Ftitle>\n<style>\n  /* ===== 字型與尺寸（依 1920×1080 投影規格設定）===== */\n  :root{\n    --bg:#05060f;\n    --panel:rgba(18,26,54,0.55);\n    --panel-line:rgba(120,170,255,0.22);\n    --ink:#eaf2ff;\n    --ink-dim:#9fb3da;\n    --cyan:#38e1ff;\n    --blue:#5b8cff;\n    --purple:#b07bff;\n    --magenta:#ff7bd5;\n\n    --type-title:66px;\n    --type-subtitle:40px;\n    --type-body:30px;\n    --type-small:24px;\n    --type-tag:21px;\n    --pad-x:96px;\n    --pad-y:80px;\n    --gap:32px;\n    --radius:20px;\n    --font:\"Noto Sans TC\",\"PingFang TC\",\"Microsoft JhengHei\",\"Heiti TC\",system-ui,sans-serif;\n  }\n  *{box-sizing:border-box;}\n  deck-stage:not(:defined){visibility:hidden;}\n  html,body{margin:0;background:#000;}\n\n  section{\n    font-family:var(--font);\n    color:var(--ink);\n    background:\n      radial-gradient(1200px 800px at 78% 18%, rgba(60,90,200,0.22), transparent 60%),\n      radial-gradient(900px 700px at 12% 92%, rgba(150,80,220,0.18), transparent 60%),\n      linear-gradient(160deg,#070a18 0%,#05060f 60%,#04050c 100%);\n    overflow:hidden;\n  }\n  /* 科技感網格背景 */\n  section::before{\n    content:\"\";position:absolute;inset:0;pointer-events:none;\n    background-image:\n      linear-gradient(rgba(120,170,255,0.05) 1px,transparent 1px),\n      linear-gradient(90deg,rgba(120,170,255,0.05) 1px,transparent 1px);\n    background-size:54px 54px;\n    mask-image:radial-gradient(120% 100% at 50% 0%,#000 40%,transparent 100%);\n  }\n  .frame{position:absolute;inset:0;padding:var(--pad-y) var(--pad-x);display:flex;flex-direction:column;}\n\n  /* ===== 章節標頭 ===== */\n  .head{display:flex;align-items:flex-end;gap:24px;margin-bottom:28px;}\n  .stage-no{\n    font-size:22px;font-weight:700;letter-spacing:.18em;color:var(--cyan);\n    border:1px solid var(--panel-line);border-radius:999px;padding:10px 20px;\n    background:rgba(56,225,255,0.06);white-space:nowrap;\n  }\n  .head h1{font-size:var(--type-title);font-weight:800;margin:0;line-height:1.05;letter-spacing:-0.01em;}\n  .head .sub{font-size:var(--type-subtitle);color:var(--ink-dim);font-weight:500;margin:0;}\n\n  .body{flex:1;display:flex;gap:48px;min-height:0;}\n  .col{display:flex;flex-direction:column;min-width:0;}\n  .lead{font-size:var(--type-body);line-height:1.55;color:var(--ink);}\n  .lead .hl{color:var(--cyan);font-weight:700;}\n  .lead .hl2{color:var(--purple);font-weight:700;}\n  .note{font-size:var(--type-small);line-height:1.6;color:var(--ink-dim);}\n\n  /* ===== 卡片 / canvas 容器 ===== */\n  .stage-card{\n    position:relative;border:1px solid var(--panel-line);border-radius:var(--radius);\n    background:var(--panel);backdrop-filter:blur(6px);overflow:hidden;\n    box-shadow:0 20px 60px rgba(0,0,0,0.45),inset 0 0 0 1px rgba(255,255,255,0.02);\n  }\n  .stage-card canvas{display:block;width:100%;height:100%;}\n  .canvas-cap{\n    position:absolute;left:18px;top:14px;font-size:var(--type-tag);font-weight:600;\n    color:var(--ink);background:rgba(6,10,24,0.6);border:1px solid var(--panel-line);\n    border-radius:10px;padding:7px 14px;letter-spacing:.02em;\n  }\n  .corner{position:absolute;width:18px;height:18px;border:2px solid var(--cyan);opacity:.5;}\n  .corner.tl{left:10px;top:10px;border-right:0;border-bottom:0;}\n  .corner.tr{right:10px;top:10px;border-left:0;border-bottom:0;}\n  .corner.bl{left:10px;bottom:10px;border-right:0;border-top:0;}\n  .corner.br{right:10px;bottom:10px;border-left:0;border-top:0;}\n\n  /* ===== 按鈕 ===== */\n  .btn-row{display:flex;flex-wrap:wrap;gap:16px;align-items:center;}\n  button.vr{\n    font-family:var(--font);font-size:var(--type-small);font-weight:700;color:var(--ink);\n    background:rgba(40,60,120,0.35);border:1px solid var(--panel-line);border-radius:14px;\n    padding:16px 26px;cursor:pointer;transition:all .18s ease;letter-spacing:.02em;\n    display:inline-flex;align-items:center;gap:10px;\n  }\n  button.vr:hover{background:rgba(56,225,255,0.16);border-color:var(--cyan);transform:translateY(-2px);\n    box-shadow:0 8px 24px rgba(56,225,255,0.2);}\n  button.vr:active{transform:translateY(0);}\n  button.vr.primary{background:linear-gradient(120deg,rgba(56,225,255,0.28),rgba(91,140,255,0.28));\n    border-color:var(--cyan);}\n  button.vr.is-active{background:rgba(56,225,255,0.28);border-color:var(--cyan);\n    box-shadow:0 0 0 2px rgba(56,225,255,0.4),0 8px 24px rgba(56,225,255,0.25);}\n  button.vr:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none;}\n  button.vr .dot{width:10px;height:10px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan);}\n\n  /* 方向鍵盤排列 */\n  .dpad{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);gap:12px;width:340px;}\n  .dpad .up{grid-column:2;grid-row:1;}\n  .dpad .left{grid-column:1;grid-row:2;}\n  .dpad .front{grid-column:2;grid-row:2;}\n  .dpad .right{grid-column:3;grid-row:2;}\n  .dpad button.vr{justify-content:center;padding:18px 0;}\n\n  /* 標籤膠囊 */\n  .chips{display:flex;flex-wrap:wrap;gap:14px;}\n  .chip{font-size:var(--type-tag);font-weight:600;padding:10px 18px;border-radius:999px;\n    border:1px solid var(--panel-line);background:rgba(20,30,60,0.5);color:var(--ink-dim);\n    display:inline-flex;align-items:center;gap:10px;transition:all .25s ease;}\n  .chip .n{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-size:15px;\n    background:rgba(56,225,255,0.15);color:var(--cyan);font-weight:800;}\n  .chip.on{color:var(--ink);border-color:var(--cyan);background:rgba(56,225,255,0.14);\n    box-shadow:0 0 24px rgba(56,225,255,0.2);}\n\n  .status{font-size:var(--type-small);color:var(--cyan);min-height:1.5em;font-weight:600;\n    display:flex;align-items:center;gap:10px;}\n  .status::before{content:\"▸\";color:var(--cyan);}\n\n  .pill-label{display:inline-flex;align-items:center;gap:10px;font-size:var(--type-tag);\n    color:var(--ink-dim);font-weight:600;}\n  .pill-label .sw{width:14px;height:14px;border-radius:4px;}\n\n  /* slider scrub */\n  input[type=range].scrub{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:6px;\n    background:linear-gradient(90deg,var(--cyan),var(--purple));outline:none;}\n  input[type=range].scrub::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;\n    background:#fff;border:3px solid var(--cyan);cursor:pointer;box-shadow:0 0 12px rgba(56,225,255,0.6);}\n\n  /* 進場動畫：可見為基準，從隱藏動畫進來 */\n  @media (prefers-reduced-motion:no-preference){\n    [data-deck-active] .anim{animation:rise .55s both;}\n    [data-deck-active] .anim.d1{animation-delay:.08s;}\n    [data-deck-active] .anim.d2{animation-delay:.16s;}\n    [data-deck-active] .anim.d3{animation-delay:.24s;}\n  }\n  @keyframes rise{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:none;}}\n\n  /* 封面 */\n  .cover{position:absolute;inset:0;}\n  .glow-title{font-size:104px;font-weight:900;line-height:1.0;letter-spacing:-0.02em;}\n  .glow-title .em{background:linear-gradient(120deg,var(--cyan),var(--purple));\n    -webkit-background-clip:text;background-clip:text;color:transparent;}\n  .kicker{font-size:24px;letter-spacing:.32em;color:var(--cyan);font-weight:700;text-transform:uppercase;}\n\n  .two-eyes{display:flex;gap:28px;flex:1;min-height:0;}\n  .eye{flex:1;position:relative;display:flex;flex-direction:column;}\n  .eye .stage-card{flex:1;}\n  .eye-label{font-size:var(--type-small);font-weight:700;text-align:center;margin-bottom:10px;color:var(--ink-dim);}\n\n  .legend{display:flex;flex-direction:column;gap:18px;}\n  .legend .row{display:flex;gap:16px;align-items:flex-start;}\n  .legend .k{font-size:var(--type-small);font-weight:700;color:var(--cyan);white-space:nowrap;}\n  .legend .v{font-size:var(--type-small);color:var(--ink-dim);line-height:1.5;}\n\n  /* ===== EQ 展開圖主視覺版型：2:1 橫向佔滿上方、文字置於下方 ===== */\n  /* 用在第一、第五階段：強調 Equirectangular 永遠是 2:1 的展開圖思考 */\n  .eq-frame{padding:44px var(--pad-x) 44px;}\n  .eq-frame .head{margin-bottom:16px;}\n  .eq-card{\n    align-self:center;           /* 不被 flex 欄拉伸，才能維持 2:1 比例 */\n    height:760px;aspect-ratio:2/1;   /* 高 760 → 寬自動 1520，鎖死 2:1 */\n    max-width:100%;flex:none;\n  }\n  .eq-below{display:flex;gap:56px;align-items:flex-start;margin-top:18px;}\n  .eq-below .lead,.eq-below .note{margin:0;}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<!-- 打包載入時的啟動畫面（離線時的後備畫面）：球體 + 展開圖意象 -->\n\n<deck-stage width=\"1920\" height=\"1080\">\n\n  <!-- ============================ 封面 ============================ -->\n  <section id=\"s-cover\" data-label=\"封面\">\n    <canvas id=\"coverGlobe\" class=\"cover\" style=\"opacity:.5;\"><\u002Fcanvas>\n    <div class=\"frame\" style=\"justify-content:center;\">\n      <div class=\"kicker anim\">VR VIDEO POST-PRODUCTION<\u002Fdiv>\n      <h1 class=\"glow-title anim d1\" style=\"margin:18px 0 0;\">VR 影片後期製作<br><span class=\"em\">從展開圖到球體內觀看<\u002Fspan><\u002Fh1>\n      <p class=\"anim d2\" style=\"font-size:var(--type-subtitle);color:var(--ink-dim);max-width:1100px;margin:30px 0 0;line-height:1.5;\">\n        一步步看懂：Equirectangular 展開圖 → 包覆成球體 → 站在球心觀看 → 投影視角局部修補 → 重新展開輸出 → Monoscopic 與 Stereoscopic 的差別。\n      <\u002Fp>\n      <div class=\"btn-row anim d3\" style=\"margin-top:48px;\">\n        <div class=\"chip on\"><span class=\"n\">→<\u002Fspan>用鍵盤 ← → 或畫面下方按鈕切換章節<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ======================= 總覽：整條流程 ======================= -->\n  <section id=\"s-overview\" data-label=\"流程總覽\">\n    <div class=\"frame\">\n      <div class=\"head\">\n        <span class=\"stage-no\">總覽<\u002Fspan>\n        <h1>後期製作的一條完整路徑<\u002Fh1>\n      <\u002Fdiv>\n      <p class=\"lead anim\" style=\"max-width:1400px;\">\n        VR 後期製作不是「在一張平面圖上修圖」這麼簡單。素材是 <span class=\"hl\">360° 全景<\u002Fspan>，\n        我們要在腦中不斷切換三種樣貌：<span class=\"hl\">攤平的展開圖<\u002Fspan>、<span class=\"hl2\">包覆起來的球體<\u002Fspan>、以及<span class=\"hl\">站在球心看出去的視角<\u002Fspan>。\n      <\u002Fp>\n      <div class=\"chips anim d1\" style=\"margin-top:48px;gap:18px;\">\n        <div class=\"chip on\"><span class=\"n\">1<\u002Fspan>Equirectangular 展開圖<\u002Fdiv>\n        <div class=\"chip\"><span class=\"n\">2<\u002Fspan>包覆成球體<\u002Fdiv>\n        <div class=\"chip\"><span class=\"n\">3<\u002Fspan>站在球心觀看<\u002Fdiv>\n        <div class=\"chip\"><span class=\"n\">4<\u002Fspan>投影視角局部修補<\u002Fdiv>\n        <div class=\"chip\"><span class=\"n\">5<\u002Fspan>重新展開輸出<\u002Fdiv>\n        <div class=\"chip\"><span class=\"n\">6<\u002Fspan>Mono / Stereo<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"body anim d2\" style=\"margin-top:48px;flex:1;\">\n        <div class=\"stage-card\" style=\"flex:1;\">\n          <span class=\"canvas-cap\">這就是我們整堂課要操作的那一張 360° 全景<\u002Fspan>\n          <span class=\"corner tl\"><\u002Fspan><span class=\"corner tr\"><\u002Fspan><span class=\"corner bl\"><\u002Fspan><span class=\"corner br\"><\u002Fspan>\n          <canvas id=\"ovEquirect\"><\u002Fcanvas>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- =================== 第一階段：認識 Equirectangular =================== -->\n  <section id=\"s1\" data-label=\"認識展開圖\">\n    <div class=\"frame eq-frame\">\n      <div class=\"head\">\n        <span class=\"stage-no\">第一階段<\u002Fspan>\n        <h1>認識 Equirectangular 展開圖<\u002Fh1>\n      <\u002Fdiv>\n      <!-- 2:1 展開圖橫向佔滿上方，文字在下方 -->\n      <div class=\"stage-card eq-card anim\">\n        <span class=\"canvas-cap\">Equirectangular ─ 2:1 展開圖<\u002Fspan>\n        <span class=\"corner tl\"><\u002Fspan><span class=\"corner tr\"><\u002Fspan><span class=\"corner bl\"><\u002Fspan><span class=\"corner br\"><\u002Fspan>\n        <canvas id=\"s1Canvas\"><\u002Fcanvas>\n      <\u002Fdiv>\n      <div class=\"eq-below anim d1\">\n        <div class=\"col\" style=\"flex:1.5;gap:12px;\">\n          <p class=\"lead\">\n            這張圖看起來像<span class=\"hl\">被攤平的地球儀<\u002Fspan>，比例固定是 <span class=\"hl\">2:1<\u002Fspan>──寬剛好是高的兩倍。\n            上緣是正上方天空、下緣是正下方地面，中間發光線是地平線；左右兩端其實是<b style=\"color:var(--ink)\">同一個方向（後方）<\u002Fb>。\n          <\u002Fp>\n        <\u002Fdiv>\n        <div class=\"col\" style=\"flex:1;gap:14px;\">\n          <div class=\"btn-row\">\n            <button class=\"vr is-active\" id=\"s1GridBtn\"><span class=\"dot\"><\u002Fspan>顯示 2:1 格線<\u002Fbutton>\n            <button class=\"vr\" id=\"s1LabelBtn\">隱藏方向標籤<\u002Fbutton>\n          <\u002Fdiv>\n          <p class=\"note\">前/右/後/左 平均分配在寬度上；越靠上下，影像被拉得越扁、變形越大──這就是展開的代價。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- =================== 第二階段：進入球體內部 =================== -->\n  <section id=\"s2\" data-label=\"進入球體\">\n    <div class=\"frame\">\n      <div class=\"head\">\n        <span class=\"stage-no\">第二階段<\u002Fspan>\n        <h1>把展開圖包覆成球體<\u002Fh1>\n      <\u002Fdiv>\n      <div class=\"body\">\n        <div class=\"col\" style=\"flex:1.35;\">\n          <div class=\"stage-card\" style=\"flex:1;\">\n            <span class=\"canvas-cap\" id=\"s2Cap\">按「包覆成球體」開始<\u002Fspan>\n            <span class=\"corner tl\"><\u002Fspan><span class=\"corner tr\"><\u002Fspan><span class=\"corner bl\"><\u002Fspan><span class=\"corner br\"><\u002Fspan>\n            <canvas id=\"s2Canvas\"><\u002Fcanvas>\n          <\u002Fdiv>\n          <div style=\"margin-top:22px;\">\n            <input type=\"range\" min=\"0\" max=\"100\" value=\"0\" class=\"scrub\" id=\"s2Scrub\">\n            <div class=\"btn-row\" style=\"margin-top:18px;\">\n              <button class=\"vr primary\" id=\"s2Play\"><span class=\"dot\"><\u002Fspan>包覆成球體<\u002Fbutton>\n              <button class=\"vr\" id=\"s2Reset\">攤平回去<\u002Fbutton>\n              <button class=\"vr\" id=\"s2Viewer\">放入觀眾<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"col\" style=\"flex:1;gap:28px;justify-content:center;\">\n          <p class=\"lead anim\">\n            戴上 VR 頭顯時，觀眾其實像是<span class=\"hl\">坐在球體（或 Dome）的正中心<\u002Fspan>，\n            影像包在四周。\n          <\u002Fp>\n          <p class=\"note anim d1\">\n            關鍵觀念：觀眾<b style=\"color:var(--magenta)\">不會一次看到整張展開圖<\u002Fb>。\n            他只看到自己<b style=\"color:var(--ink)\">正面對的那一小塊<\u002Fb>──也就是畫面中<span style=\"color:var(--cyan)\">青色高亮<\u002Fspan>的範圍。\n            想看別的方向，就要<b style=\"color:var(--ink)\">轉頭<\u002Fb>。\n          <\u002Fp>\n          <div class=\"legend anim d2\">\n            <div class=\"row\"><span class=\"k\">球心小人<\u002Fspan><span class=\"v\">就是戴頭顯的觀眾，視線朝向高亮的視角錐。<\u002Fspan><\u002Fdiv>\n            <div class=\"row\"><span class=\"k\">視角錐<\u002Fspan><span class=\"v\">一次能看到的範圍，遠小於整顆球。<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- =================== 第三階段：開啟投影模式 =================== -->\n  <section id=\"s3\" data-label=\"投影模式\">\n    <div class=\"frame\">\n      <div class=\"head\">\n        <span class=\"stage-no\">第三階段<\u002Fspan>\n        <h1>開啟投影模式，轉向某個方向<\u002Fh1>\n      <\u002Fdiv>\n      <div class=\"body\">\n        <div class=\"col\" style=\"flex:1.5;\">\n          <div class=\"stage-card\" style=\"flex:1;\">\n            <span class=\"canvas-cap\" id=\"s3Cap\">投影視角 ─ 正在看：前方<\u002Fspan>\n            <span class=\"corner tl\"><\u002Fspan><span class=\"corner tr\"><\u002Fspan><span class=\"corner bl\"><\u002Fspan><span class=\"corner br\"><\u002Fspan>\n            <canvas id=\"s3Canvas\"><\u002Fcanvas>\n          <\u002Fdiv>\n          <div class=\"status anim\" id=\"s3Status\" style=\"margin-top:20px;\">目前朝「前方」看，天空乾淨。<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"col\" style=\"flex:1;gap:28px;justify-content:center;\">\n          <p class=\"lead anim\">\n            要修改某個方向（例如<span class=\"hl\">天空的污點<\u002Fspan>），不能用平面思維。\n            編輯者要先<span class=\"hl2\">進入投影模式<\u002Fspan>，把自己放到球心，再<span class=\"hl\">轉向<\u002Fspan>那個方向。\n          <\u002Fp>\n          <div class=\"anim d1\">\n            <p class=\"pill-label\" style=\"margin:0 0 14px;\">拖曳畫面自由環顧，或一鍵切換方向：<\u002Fp>\n            <div class=\"dpad\">\n              <button class=\"vr up\" data-dir=\"up\">上<\u002Fbutton>\n              <button class=\"vr left\" data-dir=\"left\">左<\u002Fbutton>\n              <button class=\"vr front is-active\" data-dir=\"front\">前<\u002Fbutton>\n              <button class=\"vr right\" data-dir=\"right\">右<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p class=\"note anim d2\">\n            轉到<b style=\"color:var(--cyan)\">「上」<\u002Fb>抬頭看天空時，你會發現──<b style=\"color:var(--magenta)\">天上有一個污點<\u002Fb>。\n            這正是後期最常見的局部編輯場景。\n          <\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- =================== 第四階段：局部修補與合成 =================== -->\n  <section id=\"s4\" data-label=\"局部修補\">\n    <div class=\"frame\">\n      <div class=\"head\">\n        <span class=\"stage-no\">第四階段<\u002Fspan>\n        <h1>在投影視角裡修補與合成<\u002Fh1>\n      <\u002Fdiv>\n      <div class=\"body\">\n        <div class=\"col\" style=\"flex:1.5;\">\n          <div class=\"stage-card\" style=\"flex:1;\">\n            <span class=\"canvas-cap\">投影視角 ─ 抬頭看天空<\u002Fspan>\n            <span class=\"corner tl\"><\u002Fspan><span class=\"corner tr\"><\u002Fspan><span class=\"corner bl\"><\u002Fspan><span class=\"corner br\"><\u002Fspan>\n            <canvas id=\"s4Canvas\"><\u002Fcanvas>\n          <\u002Fdiv>\n          <div class=\"status anim\" id=\"s4Status\" style=\"margin-top:20px;\">天空中有一個污點，等待處理。<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"col\" style=\"flex:1;gap:28px;justify-content:center;\">\n          <p class=\"lead anim\">\n            視角被擷取成一個<span class=\"hl\">局部、可編輯的平面畫面<\u002Fspan>後，\n            我們就能像一般修圖一樣<span class=\"hl\">修補<\u002Fspan>、<span class=\"hl2\">繪圖<\u002Fspan>或<span class=\"hl2\">合成新物件<\u002Fspan>。\n          <\u002Fp>\n          <div class=\"btn-row anim d1\">\n            <button class=\"vr primary\" id=\"s4Fix\"><span class=\"dot\"><\u002Fspan>修補污點<\u002Fbutton>\n            <button class=\"vr\" id=\"s4Bird\">加入一隻鳥<\u002Fbutton>\n            <button class=\"vr\" id=\"s4Undo\">重設這個視角<\u002Fbutton>\n          <\u002Fdiv>\n          <p class=\"note anim d2\">\n            注意：現在的修改只發生在<b style=\"color:var(--ink)\">這個方向的局部視角<\u002Fb>裡。\n            但片子最後要輸出，所以它<b style=\"color:var(--cyan)\">一定得回到展開圖<\u002Fb>──那就是下一階段。\n          <\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- =================== 第五階段：重新展開輸出 =================== -->\n  <section id=\"s5\" data-label=\"重新展開\">\n    <div class=\"frame eq-frame\">\n      <div class=\"head\">\n        <span class=\"stage-no\">第五階段<\u002Fspan>\n        <h1>把修改重新展開回 Equirectangular<\u002Fh1>\n      <\u002Fdiv>\n      <!-- 同樣維持 2:1 展開圖思考：橫向佔滿上方 -->\n      <div class=\"stage-card eq-card anim\">\n        <span class=\"canvas-cap\" id=\"s5Cap\">投影視角（局部）<\u002Fspan>\n        <span class=\"corner tl\"><\u002Fspan><span class=\"corner tr\"><\u002Fspan><span class=\"corner bl\"><\u002Fspan><span class=\"corner br\"><\u002Fspan>\n        <canvas id=\"s5Canvas\"><\u002Fcanvas>\n      <\u002Fdiv>\n      <div class=\"eq-below anim d1\">\n        <div class=\"col\" style=\"flex:1.5;gap:12px;\">\n          <p class=\"lead\">\n            後期<b style=\"color:var(--magenta)\">不是改完視角就結束<\u002Fb>。最終輸出仍必須是 <span class=\"hl\">2:1 的 Equirectangular<\u002Fspan>。\n            按下展開後，剛才加在局部視角的<b style=\"color:var(--cyan)\">鳥<\u002Fb>，會被<b style=\"color:var(--ink)\">投影映射回展開圖的天空區域<\u002Fb>，並隨緯度被拉寬變形──這是正常的。\n          <\u002Fp>\n        <\u002Fdiv>\n        <div class=\"col\" style=\"flex:1;gap:14px;\">\n          <div class=\"btn-row\">\n            <button class=\"vr primary\" id=\"s5Unfold\"><span class=\"dot\"><\u002Fspan>展開回 Equirectangular<\u002Fbutton>\n            <button class=\"vr\" id=\"s5Back\">回到局部視角<\u002Fbutton>\n          <\u002Fdiv>\n          <p class=\"note\">局部視角好編輯但不是輸出格式；重新展開＝把修改映射回 2:1，才能交付成片。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- =================== 第六階段：Mono vs Stereo =================== -->\n  <section id=\"s6\" data-label=\"Mono / Stereo\">\n    <div class=\"frame\">\n      <div class=\"head\">\n        <span class=\"stage-no\">第六階段<\u002Fspan>\n        <h1>Monoscopic 與 Stereoscopic<\u002Fh1>\n      <\u002Fdiv>\n      <div class=\"body\">\n        <div class=\"col\" style=\"flex:1.5;\">\n          <div class=\"two-eyes\">\n            <div class=\"eye\">\n              <div class=\"eye-label\">左眼 Left Eye<\u002Fdiv>\n              <div class=\"stage-card\"><canvas id=\"s6Left\"><\u002Fcanvas><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"eye\">\n              <div class=\"eye-label\">右眼 Right Eye<\u002Fdiv>\n              <div class=\"stage-card\"><canvas id=\"s6Right\"><\u002Fcanvas><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"btn-row\" style=\"margin-top:22px;justify-content:center;\">\n            <button class=\"vr is-active\" id=\"s6Mono\"><span class=\"dot\"><\u002Fspan>Monoscopic<\u002Fbutton>\n            <button class=\"vr\" id=\"s6Stereo\">Stereoscopic<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"col\" style=\"flex:1;gap:26px;justify-content:center;\">\n          <p class=\"lead anim\" id=\"s6Lead\">\n            <span class=\"hl\">Monoscopic<\u002Fspan>：左眼與右眼看到<b style=\"color:var(--ink)\">完全相同<\u002Fb>的影像，沒有立體深度。\n          <\u002Fp>\n          <p class=\"note anim d1\" id=\"s6Note\">\n            最單純、檔案最小，大多數 360° 影片屬於這種。修圖一張就好。\n          <\u002Fp>\n          <div class=\"anim d2\">\n            <p class=\"pill-label\" style=\"margin:0 0 14px;\">雙眼影像在檔案裡的常見排法：<\u002Fp>\n            <div class=\"stage-card\" style=\"height:260px;\">\n              <span class=\"canvas-cap\" id=\"s6PackCap\">Mono：單一張全景<\u002Fspan>\n              <canvas id=\"s6Pack\"><\u002Fcanvas>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p class=\"note anim d2\" style=\"font-size:var(--type-tag);\">\n            提示：Stereo 模式下，比較兩個視窗裡<b style=\"color:var(--cyan)\">同一個物件<\u002Fb>的水平位置──些微差異就是大腦判斷遠近的依據。\n          <\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n\n<\u002Fdeck-stage>\n\n<script src=\"5c7cf797-048c-4e9b-b799-f42730c46bf7\"><\u002Fscript>\n<script src=\"d0ea3e08-bc0a-4718-af3a-95e09b22aca7\"><\u002Fscript>\n<script src=\"78ede137-a8d4-4bc8-9951-522388c9e9df\"><\u002Fscript>\n<script src=\"91c866fb-3b2c-41b1-b6ab-6ee4c2cb8825\"><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
