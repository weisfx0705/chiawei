  <style>
    :root {

    * { box-sizing: border-box; }
    body {

      background:
        linear-gradient(135deg, rgba(13,92,99,.10), transparent 30%),
        linear-gradient(315deg, rgba(181,139,43,.12), transparent 26%),
        repeating-linear-gradient(90deg, rgba(23,32,42,.035) 0 1px, transparent 1px 72px),
        var(--field);
    }
    button, input, select { font: inherit; }
    button { cursor: pointer; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid rgba(23,32,42,.14);
      background: rgba(255,253,248,.92);
      backdrop-filter: blur(18px);
    }
    .top-inner {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto;
      gap: 18px;
      align-items: center;
      padding: 16px 22px;
    }
    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .mark {
      width: 42px;
      aspect-ratio: 1;
      border: 2px solid var(--ink);
      background:
        linear-gradient(90deg, transparent 14px, rgba(23,32,42,.16) 14px 16px, transparent 16px 28px, rgba(23,32,42,.16) 28px 30px, transparent 30px),
        linear-gradient(145deg, var(--teal-2), #fff 58%, #f1dfb0);
      box-shadow: 5px 5px 0 var(--ink);
      flex: none;
    }
    h1 { margin: 0; font-family: Georgia, "Songti TC", serif; font-size: clamp(20px, 2.4vw, 34px); line-height: 1.05; letter-spacing: 0; }
    .subtitle { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
    .metrics { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }
    .metric {
      min-width: 92px;
      border: 1px solid var(--line);
      background: #fff;
      padding: 8px 10px;
      border-radius: 8px;
    }
    .metric b { display: block; font-size: 22px; line-height: 1; }
    .metric span { color: var(--muted); font-size: 12px; }
    .controls {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto minmax(180px, 240px) minmax(240px, 340px) auto;
      gap: 10px;
      padding: 0 22px 14px;
      align-items: center;
    }
    .search {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      min-height: 42px;
    }
    .search svg { width: 18px; color: var(--teal); }
    .search input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
    }
    .segmented {
      display: inline-flex;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
    }
    .segmented button {
      min-height: 40px;
      border: 0;
      border-right: 1px solid var(--line);
      background: transparent;
      padding: 0 11px;
      color: var(--muted);
    }
    .segmented button:last-child { border-right: 0; }
    .segmented button.active { background: var(--ink); color: #fff; }
    select, .icon-btn {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 0 12px;
      color: var(--ink);
    }
    .icon-btn { display: inline-flex; align-items: center; gap: 8px; }
    .icon-btn svg { width: 18px; }
    main {
      display: grid;
      grid-template-columns: 350px minmax(0, 1fr);
      gap: 18px;
      padding: 18px 22px 28px;
      max-width: 1500px;
      margin: 0 auto;
    }
    .list {
      align-self: start;
      position: sticky;
      top: 143px;
      max-height: calc(100vh - 166px);
      overflow: auto;
      padding-right: 4px;
    }
    .student-card {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      background: rgba(255,253,248,.9);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }
    .student-card:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(23,32,42,.08); }
    .student-card.active { border-color: var(--ink); box-shadow: 5px 5px 0 rgba(23,32,42,.92); background: #fff; }
    .card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .card-name { font-weight: 800; font-size: 18px; }
    .ticket { color: var(--muted); font-size: 12px; }
    .school { margin: 8px 0; color: var(--muted); font-size: 13px; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border: 1px solid rgba(23,32,42,.14);
      border-radius: 999px;
      padding: 2px 8px;
      background: var(--teal-2);
      font-size: 12px;
      color: #183b3e;
    }
    .chip.gold { background: #f2e3ba; color: #5b4514; }
    .chip.clay { background: #f4d8cf; color: #713020; }
    .detail {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,253,248,.96);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .detail-hero {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      padding: 22px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(90deg, rgba(215,231,221,.8), rgba(255,253,248,.45)),
        radial-gradient(circle at 85% 20%, rgba(189,79,53,.18), transparent 28%);
    }
    .detail-hero h2 { margin: 0; font-family: Georgia, "Songti TC", serif; font-size: clamp(28px, 4vw, 50px); line-height: 1; letter-spacing: 0; }
    .hero-meta { margin-top: 8px; color: var(--muted); }
    .actions { display: flex; gap: 8px; align-items: start; flex-wrap: wrap; justify-content: flex-end; }
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--line);
      background: #fff;
      overflow-x: auto;
    }
    .tabs button {
      border: 0;
      border-right: 1px solid var(--line);
      background: transparent;
      padding: 13px 16px;
      min-width: max-content;
      color: var(--muted);
    }
    .tabs button.active { color: var(--ink); background: #f7f2e9; box-shadow: inset 0 -3px 0 var(--gold); }
    .panel { padding: 22px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    .box {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 15px;
    }
    .box h3 {
      margin: 0 0 10px;
      font-size: 15px;
      color: var(--teal);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .box h3 svg { width: 17px; }
    .kv {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid #eee7dc;
      font-size: 14px;
    }
    .kv:last-child { border-bottom: 0; }
    .kv span:first-child { color: var(--muted); }
    ul { margin: 0; padding-left: 1.1em; }
    li { margin: 7px 0; }
    .quote {
      border-left: 5px solid var(--clay);
      background: #fff7f1;
      padding: 16px 18px;
      border-radius: 0 8px 8px 0;
      font-size: 18px;
      line-height: 1.72;
    }
    .question {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .question summary {
      list-style: none;
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      padding: 15px 16px;
      cursor: pointer;
      font-weight: 800;
    }
    .question summary::-webkit-details-marker { display: none; }
    .question summary span { color: var(--muted); font-weight: 600; font-size: 13px; }
    .question-body { padding: 0 16px 16px; }
    .label { margin: 12px 0 4px; color: var(--teal); font-weight: 800; font-size: 13px; }
    .resource-band {
      display: grid;
      grid-template-columns: repeat(5, minmax(150px, 1fr));
      gap: 10px;
      padding: 14px 22px 18px;
      max-width: 1500px;
      margin: 0 auto;
    }
    .resource {
      border: 1px solid rgba(23,32,42,.13);
      border-radius: 8px;
      background: rgba(255,253,248,.78);
      padding: 12px;
      min-height: 94px;
    }
    .resource b { display: block; margin-bottom: 5px; color: var(--blue); }
    .resource span { color: var(--muted); font-size: 13px; line-height: 1.45; }
    .empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 28px;
      color: var(--muted);
      background: rgba(255,255,255,.64);
      text-align: center;
    }
    @media (max-width: 980px) {
      .top-inner, .controls, main { grid-template-columns: 1fr; }
      .metrics, .actions { justify-content: flex-start; }
      .list { position: relative; top: auto; max-height: 360px; }
      .resource-band, .grid, .detail-hero { grid-template-columns: 1fr; }
      .segmented { overflow-x: auto; }
    }
    @media print {
      .topbar, .list, .tabs, .resource-band, .actions { display: none; }
      body { background: #fff; }
      main { display: block; padding: 0; }
      .detail { box-shadow: none; border: 0; }
      .panel { padding: 0; }
    }
  </style>
</head>

  <script>
    const state = { query: "", region: "全部", type: "全部", slot: "全部", selectedId: STUDENTS[0]?.id, tab: "quick" };
    const regions = ["全部", "北部", "中部", "南部", "東部", "離島", "未知"];
    const tabs = [
      ["quick", "快判讀"],
      ["talk", "話術"],
      ["questions", "提問"],
      ["details", "系所細節"],
      ["notes", "備註"]
    ];
    const allTypes = ["全部", ...Array.from(new Set(STUDENTS.flatMap(s => s.types))).sort()];
    const allSlots = ["全部", ...Array.from(new Set(STUDENTS.map(s => s.background.interviewSlot).filter(Boolean))).sort((a, b) => a.localeCompare(b, "zh-Hant"))];

    const $ = (id) => document.getElementById(id);
    const esc = (s) => String(s ?? "").replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
    const listHtml = (items) => items.length ? `<ul>${items.map(x => `<li>${esc(x)}</li>`).join("")}</ul>` : "<p>可追問確認</p>";
    const chip = (x, tone = "") => `<span class="chip ${tone}">${esc(x)}</span>`;

    function filtered() {
      const q = state.query.trim().toLowerCase();
      return STUDENTS.filter(s => {
        const okQ = !q || s.searchText.includes(q);
        const okR = state.region === "全部" || s.region === state.region;
        const okT = state.type === "全部" || s.types.includes(state.type);
        const okS = state.slot === "全部" || s.background.interviewSlot === state.slot;
        return okQ && okR && okT && okS;
      });
    }

    function renderControls() {
      $("regionTabs").innerHTML = regions.map(r => `<button type="button" class="${state.region === r ? "active" : ""}" data-region="${esc(r)}">${esc(r)}</button>`).join("");
      $("typeSelect").innerHTML = allTypes.map(t => `<option value="${esc(t)}" ${state.type === t ? "selected" : ""}>${esc(t)}</option>`).join("");
      $("slotSelect").innerHTML = allSlots.map(slot => `<option value="${esc(slot)}" ${state.slot === slot ? "selected" : ""}>${esc(slot === "全部" ? "全部梯次" : slot)}</option>`).join("");
    }

    function renderList(items) {
      $("visibleCount").textContent = String(items.length).padStart(2, "0");
      $("studentList").innerHTML = items.length ? items.map(s => `
        <button class="student-card ${s.id === state.selectedId ? "active" : ""}" type="button" data-id="${esc(s.id)}">
          <div class="card-head">
            <div>
              <div class="card-name">${String(s.index).padStart(2, "0")} ${esc(s.name)}</div>
              <div class="ticket">${esc(s.id)} · ${esc(s.region)}</div>
            </div>
            ${chip(s.background.gender, "gold")}
          </div>
          <div class="school">${esc(s.school)}</div>
          <div class="chips">${s.types.map((t, i) => chip(t, i === 2 ? "clay" : "")).join("")}</div>
        </button>`).join("") : `<div class="empty">沒有符合條件的學生</div>`;
    }

    function backgroundGrid(s) {
      const b = s.background;
      return `

          <h3><i data-lucide="id-card"></i>學生背景</h3>

          <div class="kv"><span>出生年月日</span><b>${esc(b.birthDate)}</b></div>
          <div class="kv"><span>報考學歷</span><b>${esc(b.education)}</b></div>
          <div class="kv"><span>家長姓名</span><b>${esc(b.parentName)}</b></div>
          <div class="kv"><span>報考梯次</span><b>${esc(b.interviewSlot)}</b></div>
        </div>
        <div class="box">
          <h3><i data-lucide="git-compare"></i>競爭狀況</h3>
          <div class="kv"><span>交叉查榜完整清單</span><b>${esc(s.crossSchools.join("、") || "目前未見交叉查榜資料")}</b></div>
          <div class="kv"><span>溝通方向</span><b>${esc(s.strategy)}</b></div>
          <div class="chips" style="margin-top:10px">${s.types.map((t, i) => chip(t, i === 2 ? "clay" : "")).join("")}</div>
        </div>`;
    }

    function panelQuick(s) {
      return `
        <div class="grid">
          ${backgroundGrid(s)}
          <div class="box"><h3><i data-lucide="scan-text"></i>類型理由</h3>${listHtml(s.reasons)}</div>
          <div class="box"><h3><i data-lucide="alert-circle"></i>可能在意</h3>${listHtml(s.concerns)}</div>
          <div class="box"><h3><i data-lucide="sparkles"></i>本系優勢</h3>${listHtml(s.advantages)}</div>
          <div class="box"><h3><i data-lucide="ban"></i>避免說法</h3>${listHtml(s.avoid)}</div>
        </div>`;
    }

    function panelTalk(s) {
      return `
        <div class="box"><h3><i data-lucide="message-circle"></i>30 秒開場詞</h3><div class="quote">${esc(s.opening)}</div></div>
        <div style="height:14px"></div>
        <div class="box"><h3><i data-lucide="flag"></i>20 秒收尾話術</h3><div class="quote">${esc(s.closing)}</div></div>`;
    }

    function panelQuestions(s) {
      return s.questions.map((q, idx) => `
        <details class="question" open>
          <summary>${idx + 1}. ${esc(q.title)} <span>展開／收合</span></summary>
          <div class="question-body">
            <div class="label">問題本身</div><div>${esc(q.q)}</div>
            <div class="label">想聽出的能力或動機</div><div>${esc(q.listen)}</div>
            <div class="label">回答得好時的接話</div><div>${esc(q.follow)}</div>
            <div class="label">自然連結的本系賣點</div><div>${esc(q.link)}</div>
          </div>
        </details>`).join("");
    }

    function panelDetails(s) {
      return s.details.map((d, idx) => `
        <div class="box" style="margin-bottom:12px">
          <h3><i data-lucide="film"></i>${idx + 1}. ${esc(d.point)}</h3>
          <div class="label">委員可直接說</div><div>${esc(d.say)}</div>
          <div class="label">為什麼適合</div><div>${esc(d.why)}</div>
          <div class="label">打中需求</div><div>${esc(d.need)}</div>
        </div>`).join("");
    }

    function panelNotes(s) {
      return `
        <div class="box"><h3><i data-lucide="clipboard-list"></i>委員備註</h3>${listHtml(s.notes)}</div>
        <div style="height:14px"></div>
        <div class="box"><h3><i data-lucide="list-tree"></i>交叉查榜完整清單</h3>${listHtml(s.crossSchools)}</div>`;
    }

    function renderDetail() {
      const items = filtered();
      if (!items.some(s => s.id === state.selectedId)) state.selectedId = items[0]?.id;
      const s = STUDENTS.find(x => x.id === state.selectedId);
      if (!s) {
        $("detail").innerHTML = `<div class="panel"><div class="empty">請調整搜尋或篩選條件</div></div>`;
        $("selectedIndex").textContent = "--";
        return;
      }
      $("selectedIndex").textContent = String(s.index).padStart(2, "0");
      const tabHtml = tabs.map(([id, label]) => `<button type="button" class="${state.tab === id ? "active" : ""}" data-tab="${id}">${label}</button>`).join("");
      const panels = { quick: panelQuick, talk: panelTalk, questions: panelQuestions, details: panelDetails, notes: panelNotes };
      $("detail").innerHTML = `
        <div class="detail-hero">
          <div>
            <h2>${esc(s.name)}</h2>
            <div class="hero-meta">${esc(s.school)} · ${esc(s.region)} · ${esc(s.id)}</div>
            <div class="chips" style="margin-top:12px">${s.types.map((t, i) => chip(t, i === 2 ? "clay" : "")).join("")}</div>
          </div>
          <div class="actions">
            <button class="icon-btn" type="button" data-copy="opening"><i data-lucide="copy"></i><span>複製開場</span></button>
            <button class="icon-btn" type="button" data-copy="closing"><i data-lucide="copy-check"></i><span>複製收尾</span></button>
            <button class="icon-btn" type="button" onclick="window.print()"><i data-lucide="printer"></i><span>列印</span></button>
          </div>
        </div>
        <div class="tabs">${tabHtml}</div>
        <div class="panel">${panels[state.tab](s)}</div>`;
      if (window.lucide) lucide.createIcons();
    }

    function render() {
      renderControls();
      const items = filtered();
      renderList(items);
      renderDetail();
      if (window.lucide) lucide.createIcons();
    }

    $("searchInput").addEventListener("input", (event) => {
      state.query = event.target.value;
      render();
    });
    $("regionTabs").addEventListener("click", (event) => {
      const button = event.target.closest("button[data-region]");
      if (!button) return;
      state.region = button.dataset.region;
      render();
    });
    $("typeSelect").addEventListener("change", (event) => {
      state.type = event.target.value;
      render();
    });
    $("slotSelect").addEventListener("change", (event) => {
      state.slot = event.target.value;
      render();
    });
    $("resetBtn").addEventListener("click", () => {
      state.query = "";
      state.region = "全部";
      state.type = "全部";
      state.slot = "全部";
      $("searchInput").value = "";
      render();
    });
    $("studentList").addEventListener("click", (event) => {
      const card = event.target.closest(".student-card");
      if (!card) return;
      state.selectedId = card.dataset.id;
      render();
    });
    $("detail").addEventListener("click", async (event) => {
      const tab = event.target.closest("button[data-tab]");
      if (tab) {
        state.tab = tab.dataset.tab;
        renderDetail();
        return;
      }
      const copy = event.target.closest("button[data-copy]");
      if (copy) {
        const s = STUDENTS.find(x => x.id === state.selectedId);
        const text = copy.dataset.copy === "closing" ? s.closing : s.opening;
        try {
          await navigator.clipboard.writeText(text);
          copy.querySelector("span").textContent = "已複製";
          setTimeout(renderDetail, 900);
        } catch {
          window.prompt("複製文字", text);
        }
      }
    });

    render();
  </script>
</body>
</html>
