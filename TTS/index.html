<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google TTS Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --surface2: #0f3460;
  --primary: #4fc3f7;
  --primary-dark: #0288d1;
  --accent: #e94560;
  --text: #e8e8e8;
  --text-secondary: #a0a0b0;
  --border: #2a2a4a;
  --success: #66bb6a;
  --warning: #ffa726;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Google Sans', 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-left { display:flex; align-items:center; gap:12px; }
.logo {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, #4285f4, #ea4335, #fbbc04, #34a853);
  border-radius: 8px;
  display: flex; align-items:center; justify-content:center;
  font-weight: 700; color: white; font-size: 16px;
}
.header h1 { font-size: 18px; font-weight: 500; }
.header h1 span { color: var(--primary); }

/* API Key bar */
.api-bar {
  display: flex; align-items: center; gap: 8px;
}
.api-bar input {
  width: 280px; padding: 8px 12px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 13px;
  font-family: 'JetBrains Mono', monospace;
}
.api-bar input:focus { outline: none; border-color: var(--primary); }
.api-status {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--accent); transition: background 0.3s;
}
.api-status.connected { background: var(--success); }

/* Main layout */
.main {
  display: grid;
  grid-template-columns: 1fr 400px;
  height: calc(100vh - 57px);
}

/* Left panel - TTS */
.tts-panel {
  display: flex; flex-direction: column;
  border-right: 1px solid var(--border);
  overflow: hidden;
}

/* Tabs */
.tabs {
  display: flex; gap: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.tab {
  padding: 12px 24px;
  cursor: pointer;
  font-size: 14px; font-weight: 500;
  color: var(--text-secondary);
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  display: flex; align-items: center; gap: 8px;
}
.tab:hover { color: var(--text); background: rgba(79,195,247,0.05); }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); }
.tab .material-icons-round { font-size: 18px; }

/* Config bar */
.config-bar {
  display: flex; flex-wrap: wrap; gap: 12px;
  padding: 16px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  align-items: flex-end;
}
.config-group { display: flex; flex-direction: column; gap: 4px; }
.config-group label {
  font-size: 11px; font-weight: 500;
  color: var(--text-secondary); text-transform: uppercase;
  letter-spacing: 0.5px;
}
.config-group select, .config-group input[type="text"] {
  padding: 8px 12px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 13px;
  font-family: 'Google Sans', sans-serif;
  min-width: 160px;
}
.config-group select:focus, .config-group input[type="text"]:focus {
  outline: none; border-color: var(--primary);
}

/* Content area */
.content-area {
  flex: 1; display: flex; flex-direction: column;
  overflow: hidden;
}

/* Single speaker */
.single-panel {
  flex: 1; display: flex; flex-direction: column; padding: 20px;
}
.single-panel textarea {
  flex: 1; resize: none;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
  color: var(--text); font-size: 15px; line-height: 1.8;
  font-family: 'Noto Sans TC', sans-serif;
}
.single-panel textarea:focus { outline: none; border-color: var(--primary); }
.single-panel textarea::placeholder { color: var(--text-secondary); }

/* Tone input */
.tone-input-wrapper {
  margin-bottom: 12px;
}
.tone-input-wrapper textarea {
  width: 100%; height: 60px; resize: none;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px;
  color: var(--warning); font-size: 13px; line-height: 1.5;
  font-family: 'Google Sans', sans-serif;
}
.tone-input-wrapper textarea:focus { outline: none; border-color: var(--warning); }

/* Multi speaker */
.multi-panel {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
}
.multi-config {
  display: flex; gap: 16px; padding: 16px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.speaker-config {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px;
  background: var(--bg); border-radius: 8px;
  border: 1px solid var(--border);
}
.speaker-config .speaker-badge {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
}
.speaker-config:nth-child(1) .speaker-badge { background: #4285f4; color: white; }
.speaker-config:nth-child(2) .speaker-badge { background: #ea4335; color: white; }
.speaker-config input {
  width: 80px; padding: 4px 8px;
  background: transparent; border: 1px solid var(--border);
  border-radius: 4px; color: var(--text); font-size: 13px;
}
.speaker-config input:focus { outline: none; border-color: var(--primary); }
.speaker-config select {
  padding: 4px 8px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 4px; color: var(--text); font-size: 13px;
}

.dialogue-area {
  flex: 1; overflow-y: auto; padding: 16px 20px;
}
.dialogue-line {
  display: flex; gap: 12px; margin-bottom: 8px;
  align-items: flex-start;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

.dialogue-line .line-badge {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; flex-shrink: 0;
  margin-top: 4px; cursor: pointer;
  transition: transform 0.15s;
}
.dialogue-line .line-badge:hover { transform: scale(1.1); }
.dialogue-line .line-badge.s1 { background: #4285f4; color: white; }
.dialogue-line .line-badge.s2 { background: #ea4335; color: white; }

.dialogue-line .line-content {
  flex: 1; display: flex; flex-direction: column; gap: 4px;
}
.dialogue-line .line-emotion {
  display: flex; align-items: center; gap: 4px;
}
.dialogue-line .line-emotion input {
  width: 140px; padding: 3px 8px;
  background: transparent; border: 1px solid var(--border);
  border-radius: 4px; color: var(--warning); font-size: 12px;
  font-style: italic;
}
.dialogue-line .line-emotion input:focus { outline: none; border-color: var(--warning); }
.dialogue-line .line-text {
  width: 100%; padding: 8px 12px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 14px;
  font-family: 'Noto Sans TC', sans-serif;
  resize: none; min-height: 40px; line-height: 1.6;
  overflow: hidden;
}
.dialogue-line .line-text:focus { outline: none; border-color: var(--primary); }
.dialogue-line .line-actions {
  display: flex; gap: 4px; flex-shrink: 0; margin-top: 4px;
}
.dialogue-line .line-actions button {
  width: 28px; height: 28px; border: none;
  background: transparent; color: var(--text-secondary);
  border-radius: 4px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.dialogue-line .line-actions button:hover { background: var(--surface2); color: var(--text); }

.add-line-bar {
  display: flex; gap: 8px; padding: 12px 20px;
  border-top: 1px solid var(--border);
  background: var(--surface);
}
.add-line-bar button {
  flex: 1; padding: 10px;
  border: 1px dashed var(--border);
  background: transparent; color: var(--text-secondary);
  border-radius: 8px; cursor: pointer; font-size: 13px;
  font-family: 'Google Sans', sans-serif;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 4px;
}
.add-line-bar button:hover {
  border-color: var(--primary); color: var(--primary);
  background: rgba(79,195,247,0.05);
}

/* Bottom bar */
.bottom-bar {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 20px;
  background: var(--surface);
  border-top: 1px solid var(--border);
}
.generate-btn {
  padding: 10px 28px;
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
  border: none; border-radius: 24px;
  color: white; font-size: 14px; font-weight: 500;
  cursor: pointer; font-family: 'Google Sans', sans-serif;
  display: flex; align-items: center; gap: 8px;
  transition: all 0.2s;
  box-shadow: 0 2px 12px rgba(79,195,247,0.3);
}
.generate-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(79,195,247,0.4); }
.generate-btn:active { transform: translateY(0); }
.generate-btn:disabled {
  opacity: 0.5; cursor: not-allowed; transform: none;
  box-shadow: none;
}
.generate-btn .material-icons-round { font-size: 18px; }

.audio-player-wrapper {
  flex: 1; display: flex; align-items: center; gap: 8px;
}
.audio-player-wrapper audio { flex: 1; height: 36px; }
.download-btn {
  padding: 8px 16px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 13px;
  cursor: pointer; font-family: 'Google Sans', sans-serif;
  display: flex; align-items: center; gap: 4px;
  transition: all 0.2s;
}
.download-btn:hover { border-color: var(--primary); color: var(--primary); }
.download-btn .material-icons-round { font-size: 16px; }
.hidden { display: none !important; }

/* Progress */
.progress-bar {
  height: 3px; background: var(--border);
  position: relative; overflow: hidden;
  border-radius: 2px;
}
.progress-bar .fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  width: 0%; transition: width 0.3s;
}
.progress-bar.indeterminate .fill {
  width: 30%;
  animation: indeterminate 1.5s infinite;
}
@keyframes indeterminate {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(400%); }
}

/* Right panel - Chat */
.chat-panel {
  display: flex; flex-direction: column;
  background: var(--surface);
  overflow: hidden;
}
.chat-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.chat-header h2 {
  font-size: 14px; font-weight: 500;
  display: flex; align-items: center; gap: 8px;
}
.chat-header h2 .material-icons-round { font-size: 18px; color: var(--primary); }
.chat-header .chat-actions { display: flex; gap: 4px; }
.chat-header button {
  padding: 6px; border: none;
  background: transparent; color: var(--text-secondary);
  border-radius: 6px; cursor: pointer;
  display: flex; align-items: center;
}
.chat-header button:hover { background: var(--bg); color: var(--text); }

.chat-messages {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 12px;
}
.chat-msg {
  padding: 10px 14px;
  border-radius: var(--radius);
  font-size: 13px; line-height: 1.7;
  max-width: 95%; white-space: pre-wrap;
  word-break: break-word;
  animation: fadeIn 0.3s ease;
}
.chat-msg.user {
  background: var(--surface2);
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.chat-msg.assistant {
  background: var(--bg);
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}
.chat-msg.system {
  background: rgba(79,195,247,0.1);
  border: 1px solid rgba(79,195,247,0.2);
  align-self: center;
  text-align: center;
  font-size: 12px;
  color: var(--text-secondary);
}
.chat-msg pre {
  background: rgba(0,0,0,0.3);
  padding: 8px 12px; border-radius: 6px;
  overflow-x: auto; margin: 8px 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
}
.chat-msg .apply-btn {
  margin-top: 8px;
  padding: 6px 14px;
  background: var(--primary-dark);
  border: none; border-radius: 6px;
  color: white; font-size: 12px;
  cursor: pointer; font-family: 'Google Sans', sans-serif;
  display: inline-flex; align-items: center; gap: 4px;
}
.chat-msg .apply-btn:hover { background: var(--primary); }

.chat-input-area {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex; gap: 8px;
}
.chat-input-area textarea {
  flex: 1; resize: none;
  padding: 10px 14px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text);
  font-size: 13px; line-height: 1.5;
  font-family: 'Noto Sans TC', 'Google Sans', sans-serif;
  max-height: 120px;
}
.chat-input-area textarea:focus { outline: none; border-color: var(--primary); }
.chat-input-area textarea::placeholder { color: var(--text-secondary); }
.chat-send-btn {
  width: 40px; height: 40px;
  background: var(--primary); border: none;
  border-radius: 50%; color: white;
  cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  transition: all 0.2s; align-self: flex-end;
}
.chat-send-btn:hover { background: var(--primary-dark); transform: scale(1.05); }
.chat-send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

/* Responsive */
@media (max-width: 900px) {
  .main { grid-template-columns: 1fr; }
  .chat-panel { display: none; }
  .chat-panel.mobile-open { display: flex; position: fixed; inset: 57px 0 0 0; z-index: 50; }
}

/* Toast */
.toast-container {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%);
  z-index: 999; display: flex;
  flex-direction: column; gap: 8px;
  align-items: center;
}
.toast {
  padding: 10px 20px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px; font-size: 13px;
  box-shadow: var(--shadow);
  animation: toastIn 0.3s ease;
}
.toast.error { border-color: var(--accent); color: var(--accent); }
.toast.success { border-color: var(--success); color: var(--success); }
@keyframes toastIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

/* SRT Panel */
.srt-panel {
  flex: 1; display: flex; flex-direction: column;
  padding: 0; overflow: hidden;
}
.srt-upload-zone {
  margin: 16px 20px;
  padding: 32px 20px;
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.srt-upload-zone:hover, .srt-upload-zone.dragover {
  border-color: var(--primary);
  background: rgba(79,195,247,0.05);
}
.srt-upload-zone .material-icons-round { font-size: 36px; color: var(--text-secondary); }
.srt-upload-zone p { margin-top: 8px; font-size: 13px; color: var(--text-secondary); }
.srt-upload-zone input[type="file"] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer;
}

.srt-entries-wrapper {
  flex: 1; overflow-y: auto; padding: 0 20px 16px;
}
.srt-entry {
  display: flex; gap: 12px; align-items: flex-start;
  padding: 10px 12px; margin-bottom: 6px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; font-size: 13px;
  transition: all 0.2s;
}
.srt-entry.generating {
  border-color: var(--warning);
  background: rgba(255,167,38,0.05);
}
.srt-entry.done {
  border-color: var(--success);
  background: rgba(102,187,106,0.05);
}
.srt-entry.error {
  border-color: var(--accent);
  background: rgba(233,69,96,0.05);
}
.srt-entry-index {
  color: var(--text-secondary); font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  min-width: 28px; text-align: right; padding-top: 2px;
}
.srt-entry-tc {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--primary);
  white-space: nowrap; min-width: 220px;
}
.srt-entry-text {
  flex: 1; color: var(--text); line-height: 1.5;
}
.srt-entry-status {
  font-size: 16px; flex-shrink: 0; padding-top: 1px;
}
.srt-progress-bar {
  margin: 0 20px 12px;
}
.srt-progress-bar .progress-text {
  font-size: 12px; color: var(--text-secondary);
  margin-bottom: 4px; display: flex; justify-content: space-between;
}
.srt-retry-btn {
  background: transparent; border: 1px solid var(--accent);
  color: var(--accent); border-radius: 6px;
  cursor: pointer; padding: 2px 6px;
  display: flex; align-items: center; gap: 2px;
  transition: all 0.15s; font-size: 11px;
  font-family: 'Google Sans', sans-serif;
}
.srt-retry-btn:hover { background: var(--accent); color: white; }

/* SRT editable text */
.srt-entry-text textarea {
  width: 100%; resize: none; border: none;
  background: transparent; color: var(--text);
  font-size: 13px; line-height: 1.5;
  font-family: 'Noto Sans TC', 'Google Sans', sans-serif;
  padding: 0; overflow: hidden;
}
.srt-entry-text textarea:focus {
  outline: none; background: rgba(79,195,247,0.06);
  border-radius: 4px; padding: 2px 4px;
  margin: -2px -4px;
}

/* SRT checkbox for merge */
.srt-entry-cb {
  flex-shrink: 0; margin-top: 2px;
}
.srt-entry-cb input[type="checkbox"] {
  width: 16px; height: 16px; cursor: pointer;
  accent-color: var(--primary);
}
/* SRT actions row */
.srt-entry-actions {
  display: flex; gap: 4px; flex-shrink: 0; align-items: center;
}
.srt-entry-actions button {
  width: 28px; height: 28px; border: none;
  background: transparent; color: var(--text-secondary);
  border-radius: 4px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.srt-entry-actions button:hover { background: var(--surface2); color: var(--text); }

/* SRT merge bar */
.srt-merge-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 0; margin-bottom: 6px;
}
.srt-merge-bar .merge-info {
  font-size: 12px; color: var(--text-secondary);
}
.srt-config-bar {
  display: flex; flex-wrap: wrap; gap: 12px;
  padding: 12px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  align-items: flex-end;
}

/* Loading spinner in button */
.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Import/Export buttons */
.import-export-bar {
  display: flex; gap: 4px; margin-left: auto;
}
.icon-btn {
  padding: 6px 10px;
  background: transparent; border: 1px solid var(--border);
  border-radius: 6px; color: var(--text-secondary);
  cursor: pointer; font-size: 12px;
  font-family: 'Google Sans', sans-serif;
  display: flex; align-items: center; gap: 4px;
  transition: all 0.15s;
}
.icon-btn:hover { border-color: var(--primary); color: var(--primary); }
.icon-btn .material-icons-round { font-size: 14px; }

/* Gender badge */
.gender-badge {
  font-size: 13px; font-weight: 700;
  width: 20px; text-align: center; flex-shrink: 0;
}
.gender-female { color: #f48fb1; }
.gender-male   { color: #90caf9; }

/* Voice preview */
.voice-select-row {
  display: flex; align-items: center; gap: 4px;
}
.voice-preview-btn {
  width: 30px; height: 30px; flex-shrink: 0;
  background: transparent; border: none;
  color: var(--text-secondary); cursor: pointer;
  border-radius: 50%; display: flex;
  align-items: center; justify-content: center;
  transition: all 0.15s;
  padding: 0;
}
.voice-preview-btn:hover { color: var(--primary); background: rgba(79,195,247,0.1); }
.voice-preview-btn.loading { color: var(--warning); animation: pulse 1s infinite; }
.voice-preview-btn.playing { color: var(--success); }
.voice-preview-btn .material-icons-round { font-size: 22px; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* View toggle */
.view-toggle { display: flex; gap: 2px; }
.view-btn.active {
  background: var(--primary-dark); border-color: var(--primary-dark);
  color: white;
}
.view-btn.active:hover { background: var(--primary); }

/* Script view */
.script-view {
  flex: 1; display: flex; flex-direction: column;
  padding: 0; overflow: hidden;
}
.script-hint {
  padding: 10px 20px;
  background: rgba(79,195,247,0.08);
  border-bottom: 1px solid rgba(79,195,247,0.15);
  font-size: 12px; color: var(--primary);
  display: flex; align-items: center; gap: 6px;
}
.script-view textarea {
  flex: 1; resize: none;
  background: var(--bg); border: none;
  padding: 16px 20px;
  color: var(--text); font-size: 14px; line-height: 1.8;
  font-family: 'JetBrains Mono', 'Noto Sans TC', monospace;
  border-bottom: 1px solid var(--border);
}
.script-view textarea:focus { outline: none; }
.script-view textarea::placeholder { color: var(--text-secondary); font-size: 13px; }
.script-actions {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 20px;
  background: var(--surface);
}
.script-line-count {
  font-size: 12px; color: var(--text-secondary);
  margin-left: auto;
}

/* Editor view */
.editor-view {
  flex: 1; display: flex; flex-direction: column;
  overflow: hidden;
}

/* Text format modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; animation: fadeIn 0.2s;
}
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px; width: 90%; max-width: 600px;
  max-height: 80vh; overflow-y: auto;
  box-shadow: var(--shadow);
}
.modal h3 { margin-bottom: 12px; font-size: 16px; }
.modal textarea {
  width: 100%; min-height: 300px; resize: vertical;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px;
  color: var(--text); font-size: 13px;
  font-family: 'JetBrains Mono', monospace;
  line-height: 1.6;
}
.modal textarea:focus { outline: none; border-color: var(--primary); }
.modal-actions {
  display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end;
}
.modal-actions button {
  padding: 8px 18px;
  border-radius: 8px; font-size: 13px;
  cursor: pointer; font-family: 'Google Sans', sans-serif;
  border: 1px solid var(--border);
  transition: all 0.15s;
}
.modal-actions .cancel { background: transparent; color: var(--text-secondary); }
.modal-actions .cancel:hover { color: var(--text); }
.modal-actions .confirm { background: var(--primary); border-color: var(--primary); color: white; }
.modal-actions .confirm:hover { background: var(--primary-dark); }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="logo">G</div>
    <h1>Google <span>TTS Studio</span></h1>
  </div>
  <div class="api-bar">
    <select id="modelSelect" style="padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:'Google Sans',sans-serif;">
      <option value="gemini-3.1-flash-tts-preview">Gemini 3.1 Flash TTS</option>
    </select>
    <div class="api-status" id="apiStatus" title="API 未連接"></div>
    <input type="password" id="apiKeyInput" placeholder="Enter Gemini API Key..." spellcheck="false">
    <button class="icon-btn" onclick="toggleApiKeyVisibility()" title="顯示/隱藏 API Key">
      <span class="material-icons-round" id="apiKeyToggleIcon">visibility</span>
    </button>
  </div>
</div>

<!-- Main -->
<div class="main">
  <!-- Left: TTS Panel -->
  <div class="tts-panel">
    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" data-tab="single" onclick="switchTab('single')">
        <span class="material-icons-round">person</span> 單人語音
      </div>
      <div class="tab" data-tab="multi" onclick="switchTab('multi')">
        <span class="material-icons-round">group</span> 雙人對話
      </div>
      <div class="tab" data-tab="srt" onclick="switchTab('srt')">
        <span class="material-icons-round">subtitles</span> SRT 配音
      </div>
    </div>

    <!-- Config Bar -->
    <div class="config-bar" id="singleConfig">
      <div class="config-group">
        <label>語音</label>
        <div class="voice-select-row">
          <select id="voiceSelect"></select>
          <button class="voice-preview-btn" onclick="previewVoice('voiceSelect', this)" title="試聽這個語音">
            <span class="material-icons-round">play_circle</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Content: Single -->
    <div class="content-area" id="singleContent">
      <div class="single-panel">
        <div class="tone-input-wrapper">
          <label style="font-size:12px;color:var(--text-secondary);margin-bottom:4px;display:block;">
            <span class="material-icons-round" style="font-size:14px;vertical-align:middle;">tune</span>
            語氣/風格指令 (Prompt Prefix)
          </label>
          <textarea id="toneInput" placeholder="例如: Read aloud in a warm, friendly Taiwanese Mandarin tone, with a moderate pace..."></textarea>
        </div>
        <textarea id="singleText" placeholder="在這裡輸入要朗讀的文字...&#10;&#10;提示：語氣可透過上方的指令來控制，也可以在文字中用自然語言描述。"></textarea>
      </div>
    </div>

    <!-- Content: Multi -->
    <div class="content-area hidden" id="multiContent">
      <div class="multi-config">
        <div class="speaker-config">
          <div class="speaker-badge">S1</div>
          <input type="text" id="speaker1Name" value="Speaker 1" placeholder="名稱">
          <div class="voice-select-row">
            <select id="voice1Select"></select>
            <button class="voice-preview-btn" onclick="previewVoice('voice1Select', this)" title="試聽這個語音">
              <span class="material-icons-round">play_circle</span>
            </button>
          </div>
        </div>
        <div class="speaker-config">
          <div class="speaker-badge">S2</div>
          <input type="text" id="speaker2Name" value="Speaker 2" placeholder="名稱">
          <div class="voice-select-row">
            <select id="voice2Select"></select>
            <button class="voice-preview-btn" onclick="previewVoice('voice2Select', this)" title="試聽這個語音">
              <span class="material-icons-round">play_circle</span>
            </button>
          </div>
        </div>
        <div class="import-export-bar">
          <!-- View toggle -->
          <div class="view-toggle">
            <button class="icon-btn view-btn active" id="viewBtnEditor" onclick="switchView('editor')" title="編輯器模式">
              <span class="material-icons-round">view_list</span> 編輯器
            </button>
            <button class="icon-btn view-btn" id="viewBtnScript" onclick="switchView('script')" title="腳本模式 (直接貼上)">
              <span class="material-icons-round">code</span> 腳本
            </button>
          </div>
          <button class="icon-btn" onclick="exportDialogue()" title="匯出/複製為純文字">
            <span class="material-icons-round">content_copy</span> 複製
          </button>
        </div>
      </div>

      <!-- Script View: raw text paste area -->
      <div class="script-view hidden" id="scriptView">
        <div class="script-hint">
          <span class="material-icons-round" style="font-size:16px;vertical-align:middle;">info</span>
          直接貼上完整對話稿，格式自動解析。前幾行非對話文字會作為語氣指令。
        </div>
        <textarea id="scriptTextarea" placeholder="直接貼上對話稿...&#10;&#10;範例格式：&#10;台灣的舞台劇表演，節奏快，情緒多變&#10;Read aloud in a humorous tone&#10;&#10;Speaker 1: [eager] 你好嗎？&#10;Speaker 2: [cheerful] 我很好！&#10;Speaker 1: [curious] 你在幹嘛？"
          spellcheck="false"></textarea>
        <div class="script-actions">
          <button class="icon-btn" onclick="parseScriptAndSwitch()" style="background:var(--primary);border-color:var(--primary);color:white;">
            <span class="material-icons-round">check</span> 解析並切換到編輯器
          </button>
          <span class="script-line-count" id="scriptLineCount">0 行對話</span>
        </div>
      </div>

      <!-- Editor View -->
      <div class="editor-view" id="editorView">
        <div class="tone-input-wrapper" style="padding:12px 20px 0;">
          <label style="font-size:12px;color:var(--text-secondary);margin-bottom:4px;display:block;">
            <span class="material-icons-round" style="font-size:14px;vertical-align:middle;">tune</span>
            語氣/風格指令 (Multi-Speaker Prompt Prefix)
          </label>
          <textarea id="multiToneInput" placeholder="例如: 台灣的舞台劇表演，節奏快，情緒多變&#10;Read aloud in a humorous, confusing Taiwanese Mandarin tone, with a fast pace"></textarea>
        </div>
        <div class="dialogue-area" id="dialogueArea"></div>
        <div class="add-line-bar">
          <button onclick="addDialogueLine(1)">
            <span class="material-icons-round" style="font-size:16px;">add</span>
            Speaker 1
          </button>
          <button onclick="addDialogueLine(2)">
            <span class="material-icons-round" style="font-size:16px;">add</span>
            Speaker 2
          </button>
        </div>
      </div>
    </div>

    <!-- Content: SRT -->
    <div class="content-area hidden" id="srtContent">
      <div class="srt-config-bar">
        <div class="config-group">
          <label>語音</label>
          <div class="voice-select-row">
            <select id="srtVoiceSelect"></select>
            <button class="voice-preview-btn" onclick="previewVoice('srtVoiceSelect', this)" title="試聽這個語音">
              <span class="material-icons-round">play_circle</span>
            </button>
          </div>
        </div>
        <div class="config-group">
          <label>語氣/風格指令</label>
          <input type="text" id="srtToneInput" placeholder="例如: Read in a warm Taiwanese Mandarin tone" style="min-width:320px;">
        </div>
      </div>
      <div class="srt-panel">
        <div class="srt-upload-zone" id="srtUploadZone">
          <input type="file" accept=".srt" id="srtFileInput" onchange="handleSrtFile(event)">
          <span class="material-icons-round">upload_file</span>
          <p>拖放 .srt 檔案到此處，或點擊上傳<br><span style="font-size:11px;color:var(--text-secondary);">也可以直接在下方貼上 SRT 內容</span></p>
        </div>
        <div class="srt-progress-bar hidden" id="srtProgressBar">
          <div class="progress-text">
            <span id="srtProgressText">準備中...</span>
            <span id="srtProgressCount">0 / 0</span>
          </div>
          <div class="progress-bar">
            <div class="fill" id="srtProgressFill"></div>
          </div>
        </div>
        <div class="srt-entries-wrapper" id="srtEntriesWrapper">
          <div id="srtEntries" style="min-height:100px;"></div>
          <!-- Paste fallback -->
          <textarea id="srtPasteArea" placeholder="或直接貼上 SRT 內容...&#10;&#10;1&#10;00:00:01,000 --> 00:00:04,000&#10;你好，歡迎收看今天的節目。&#10;&#10;2&#10;00:00:05,500 --> 00:00:08,000&#10;今天我們要來聊一個有趣的話題。"
            style="width:100%;min-height:200px;resize:vertical;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px;color:var(--text);font-size:13px;font-family:'JetBrains Mono','Noto Sans TC',monospace;line-height:1.7;"
            spellcheck="false"></textarea>
          <div style="display:flex;gap:8px;margin-top:8px;">
            <button class="icon-btn" onclick="parseSrtFromPaste()" style="background:var(--primary);border-color:var(--primary);color:white;">
              <span class="material-icons-round">check</span> 解析 SRT
            </button>
            <button class="icon-btn" onclick="clearSrt()">
              <span class="material-icons-round">delete_outline</span> 清除
            </button>
            <span id="srtEntryCount" style="font-size:12px;color:var(--text-secondary);margin-left:auto;align-self:center;">尚未載入</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Bottom bar -->
    <div class="bottom-bar">
      <button class="generate-btn" id="generateBtn" onclick="generateSpeech()">
        <span class="material-icons-round">play_arrow</span>
        <span id="generateBtnText">生成語音</span>
      </button>
      <div class="audio-player-wrapper hidden" id="audioPlayerWrapper">
        <audio id="audioPlayer" controls></audio>
        <button class="download-btn" onclick="downloadAudio()">
          <span class="material-icons-round">download</span>
          下載
        </button>
      </div>
    </div>
  </div>

  <!-- Right: Chat Panel -->
  <div class="chat-panel hidden" id="chatPanel">
    <div class="chat-header">
      <h2>
        <span class="material-icons-round">smart_toy</span>
        對話稿助手
      </h2>
      <div class="chat-actions">
        <button onclick="clearChat()" title="清除對話">
          <span class="material-icons-round" style="font-size:18px;">delete_outline</span>
        </button>
      </div>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="chat-msg system">
        AI 對話稿助手 — 幫你產生適合 TTS 的雙人對話稿<br>
        輸入你的想法，AI 會生成符合格式的對話稿
      </div>
    </div>
    <div class="chat-input-area">
      <textarea id="chatInput" placeholder="描述你想要的對話場景..." rows="2"
        onkeydown="handleChatKeydown(event)"></textarea>
      <button class="chat-send-btn" id="chatSendBtn" onclick="sendChat()">
        <span class="material-icons-round" style="font-size:20px;">send</span>
      </button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ─── Voices ───
const VOICE_FEMALE = [
  'Zephyr','Kore','Leda','Aoede','Callirrhoe','Autonoe','Despina',
  'Erinome','Laomedeia','Achernar','Gacrux','Pulcherrima','Vindemiatrix','Sulafat'
];
const VOICE_MALE = [
  'Puck','Charon','Fenrir','Orus','Enceladus','Iapetus','Umbriel','Algieba',
  'Algenib','Rasalgethi','Alnilam','Schedar','Achird','Zubenelgenubi',
  'Sadachbia','Sadaltager'
];

function voiceGender(name) {
  if (VOICE_FEMALE.includes(name)) return 'female';
  if (VOICE_MALE.includes(name)) return 'male';
  return 'unknown';
}

// Populate voice selects with gender grouping
function populateVoices() {
  ['voiceSelect','voice1Select','voice2Select','srtVoiceSelect'].forEach((id, idx) => {
    const sel = document.getElementById(id);
    sel.innerHTML = '';

    const femaleGroup = document.createElement('optgroup');
    femaleGroup.label = '♀ 女聲 Female';
    VOICE_FEMALE.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v; opt.textContent = v;
      femaleGroup.appendChild(opt);
    });

    const maleGroup = document.createElement('optgroup');
    maleGroup.label = '♂ 男聲 Male';
    VOICE_MALE.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v; opt.textContent = v;
      maleGroup.appendChild(opt);
    });

    sel.appendChild(femaleGroup);
    sel.appendChild(maleGroup);

    if (idx === 0) sel.value = 'Kore';
    if (idx === 1) sel.value = 'Aoede';
    if (idx === 2) sel.value = 'Charon';
    if (idx === 3) sel.value = 'Kore';

    // Update gender badge on change
    sel.addEventListener('change', () => updateGenderBadge(sel));
    updateGenderBadge(sel);
  });
}

function updateGenderBadge(sel) {
  const gender = voiceGender(sel.value);
  const row = sel.closest('.voice-select-row');
  if (!row) return;
  let badge = row.querySelector('.gender-badge');
  if (!badge) {
    badge = document.createElement('span');
    badge.className = 'gender-badge';
    sel.insertAdjacentElement('beforebegin', badge);
  }
  badge.textContent = gender === 'female' ? '♀' : gender === 'male' ? '♂' : '';
  badge.className = `gender-badge gender-${gender}`;
}

populateVoices();

// ─── API Key ───
const apiKeyInput = document.getElementById('apiKeyInput');
const apiStatus = document.getElementById('apiStatus');

// Load saved key
const savedKey = localStorage.getItem('gemini_api_key');
if (savedKey) { apiKeyInput.value = savedKey; apiStatus.classList.add('connected'); apiStatus.title = 'API Key 已設定'; }

apiKeyInput.addEventListener('input', () => {
  const key = apiKeyInput.value.trim();
  localStorage.setItem('gemini_api_key', key);
  if (key) { apiStatus.classList.add('connected'); apiStatus.title = 'API Key 已設定'; }
  else { apiStatus.classList.remove('connected'); apiStatus.title = 'API 未連接'; }
});

function toggleApiKeyVisibility() {
  const inp = document.getElementById('apiKeyInput');
  const icon = document.getElementById('apiKeyToggleIcon');
  if (inp.type === 'password') { inp.type = 'text'; icon.textContent = 'visibility_off'; }
  else { inp.type = 'password'; icon.textContent = 'visibility'; }
}

function getApiKey() {
  const k = apiKeyInput.value.trim();
  if (!k) { showToast('請先輸入 Gemini API Key', 'error'); return null; }
  return k;
}

// ─── Tabs ───
let currentTab = 'single';
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('singleContent').classList.toggle('hidden', tab !== 'single');
  document.getElementById('multiContent').classList.toggle('hidden', tab !== 'multi');
  document.getElementById('srtContent').classList.toggle('hidden', tab !== 'srt');
  document.getElementById('singleConfig').classList.toggle('hidden', tab !== 'single');
  document.getElementById('chatPanel').classList.toggle('hidden', tab !== 'multi');
}

// ─── View Toggle (Script / Editor) ───
let currentView = 'editor';

function switchView(view) {
  currentView = view;
  document.getElementById('viewBtnEditor').classList.toggle('active', view === 'editor');
  document.getElementById('viewBtnScript').classList.toggle('active', view === 'script');
  document.getElementById('editorView').classList.toggle('hidden', view !== 'editor');
  document.getElementById('scriptView').classList.toggle('hidden', view !== 'script');

  if (view === 'script') {
    // Sync editor → script textarea
    syncEditorToScript();
  } else {
    // When switching back to editor, auto-parse script if it has content
    const scriptText = document.getElementById('scriptTextarea').value.trim();
    if (scriptText) {
      parseDialogueText(scriptText);
    }
  }
}

function syncEditorToScript() {
  const s1 = document.getElementById('speaker1Name').value || 'Speaker 1';
  const s2 = document.getElementById('speaker2Name').value || 'Speaker 2';
  const tone = document.getElementById('multiToneInput').value.trim();
  let text = '';
  if (tone) text += tone + '\n\n';
  dialogueLines.forEach(l => {
    if (!l.text.trim() && !l.emotion) return;
    const name = l.speaker === 1 ? s1 : s2;
    const emotionTag = l.emotion ? ` [${l.emotion}]` : '';
    text += `${name}:${emotionTag} ${l.text}\n\n`;
  });
  document.getElementById('scriptTextarea').value = text.trimEnd();
  updateScriptLineCount();
}

function parseScriptAndSwitch() {
  const scriptText = document.getElementById('scriptTextarea').value.trim();
  if (!scriptText) { showToast('請先貼上對話稿', 'error'); return; }
  parseDialogueText(scriptText);
  switchView('editor');
}

function updateScriptLineCount() {
  const text = document.getElementById('scriptTextarea').value;
  const lines = text.split('\n').filter(l => /^.+?:\s*(\[.+?\])?\s*.+/.test(l.trim()));
  document.getElementById('scriptLineCount').textContent = `${lines.length} 行對話`;
}

// Auto-parse on paste in script view
document.addEventListener('DOMContentLoaded', () => {
  const scriptTa = document.getElementById('scriptTextarea');
  if (scriptTa) {
    scriptTa.addEventListener('paste', () => {
      // Wait for paste content to populate
      setTimeout(() => {
        updateScriptLineCount();
        // Auto-preview: parse and show count
        const text = scriptTa.value.trim();
        if (text) {
          const lines = text.split('\n').filter(l => /^.+?:\s*(\[.+?\])?\s*.+/.test(l.trim()));
          if (lines.length >= 2) {
            showToast(`偵測到 ${lines.length} 行對話，點擊「解析」或直接切回編輯器`, 'success');
          }
        }
      }, 50);
    });
    scriptTa.addEventListener('input', () => updateScriptLineCount());
  }
});

// ─── Dialogue Lines ───
let dialogueLines = [];
let lineIdCounter = 0;

function addDialogueLine(speaker, emotion = '', text = '') {
  const id = ++lineIdCounter;
  dialogueLines.push({ id, speaker, emotion, text });
  renderDialogue();
  // Focus new line
  setTimeout(() => {
    const el = document.querySelector(`[data-line-id="${id}"] .line-text`);
    if (el) el.focus();
  }, 50);
}

function removeDialogueLine(id) {
  dialogueLines = dialogueLines.filter(l => l.id !== id);
  renderDialogue();
}

function toggleSpeaker(id) {
  const line = dialogueLines.find(l => l.id === id);
  if (line) { line.speaker = line.speaker === 1 ? 2 : 1; renderDialogue(); }
}

function renderDialogue() {
  const area = document.getElementById('dialogueArea');
  area.innerHTML = '';
  dialogueLines.forEach(line => {
    const div = document.createElement('div');
    div.className = 'dialogue-line';
    div.dataset.lineId = line.id;
    div.innerHTML = `
      <div class="line-badge s${line.speaker}" onclick="toggleSpeaker(${line.id})" title="點擊切換講者">
        S${line.speaker}
      </div>
      <div class="line-content">
        <div class="line-emotion">
          <input type="text" value="${escHtml(line.emotion)}" placeholder="情緒 e.g. eager"
            oninput="updateLine(${line.id},'emotion',this.value)">
        </div>
        <textarea class="line-text" placeholder="輸入對話..."
          oninput="updateLine(${line.id},'text',this.value); autoResize(this)"
          onkeydown="handleLineKeydown(event, ${line.id})">${escHtml(line.text)}</textarea>
      </div>
      <div class="line-actions">
        <button onclick="moveLineUp(${line.id})" title="上移"><span class="material-icons-round">arrow_upward</span></button>
        <button onclick="moveLineDown(${line.id})" title="下移"><span class="material-icons-round">arrow_downward</span></button>
        <button onclick="removeDialogueLine(${line.id})" title="刪除"><span class="material-icons-round">close</span></button>
      </div>
    `;
    area.appendChild(div);
    // Auto resize text
    const ta = div.querySelector('.line-text');
    autoResize(ta);
  });
  area.scrollTop = area.scrollHeight;
}

function updateLine(id, field, value) {
  const line = dialogueLines.find(l => l.id === id);
  if (line) line[field] = value;
}

function handleLineKeydown(e, id) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const line = dialogueLines.find(l => l.id === id);
    addDialogueLine(line.speaker === 1 ? 2 : 1);
  }
}

function moveLineUp(id) {
  const idx = dialogueLines.findIndex(l => l.id === id);
  if (idx > 0) { [dialogueLines[idx-1], dialogueLines[idx]] = [dialogueLines[idx], dialogueLines[idx-1]]; renderDialogue(); }
}
function moveLineDown(id) {
  const idx = dialogueLines.findIndex(l => l.id === id);
  if (idx < dialogueLines.length - 1) { [dialogueLines[idx+1], dialogueLines[idx]] = [dialogueLines[idx], dialogueLines[idx+1]]; renderDialogue(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Import/Export ───
function exportDialogue() {
  const s1 = document.getElementById('speaker1Name').value || 'Speaker 1';
  const s2 = document.getElementById('speaker2Name').value || 'Speaker 2';
  const tone = document.getElementById('multiToneInput').value.trim();
  let text = '';
  if (tone) text += tone + '\n\n';
  dialogueLines.forEach(l => {
    const name = l.speaker === 1 ? s1 : s2;
    const emotionTag = l.emotion ? ` [${l.emotion}]` : '';
    text += `${name}:${emotionTag} ${l.text}\n\n`;
  });
  // Copy to clipboard
  navigator.clipboard.writeText(text.trim()).then(() => {
    showToast('對話稿已複製到剪貼簿', 'success');
  });
}

function parseDialogueText(text) {
  dialogueLines = [];
  lineIdCounter = 0;

  const lines = text.split('\n');
  let toneLines = [];
  let dialogueStarted = false;
  let dialogText = [];

  // Phase 1: Separate tone/style lines from dialogue lines
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) { if (dialogueStarted) dialogText.push(''); continue; }
    // Match "SpeakerName: [emotion] text" or "SpeakerName: text"
    const speakerMatch = trimmed.match(/^(.+?):\s*(?:\[(.+?)\])?\s*(.+)$/);
    if (speakerMatch) {
      dialogueStarted = true;
      dialogText.push(trimmed);
    } else if (!dialogueStarted) {
      toneLines.push(trimmed);
    }
    // Non-matching lines after dialogue started are ignored (blank separators)
  }

  if (toneLines.length > 0) {
    document.getElementById('multiToneInput').value = toneLines.join('\n');
  }

  // Phase 2: Detect unique speaker names automatically
  let speakerNames = [];
  for (const line of dialogText) {
    if (!line.trim()) continue;
    const m = line.trim().match(/^(.+?):\s*(?:\[.+?\])?\s*.+$/);
    if (m) {
      const name = m[1].trim();
      if (!speakerNames.includes(name)) speakerNames.push(name);
    }
  }
  // First unique name = Speaker 1, second = Speaker 2
  const name1 = speakerNames[0] || 'Speaker 1';
  const name2 = speakerNames[1] || 'Speaker 2';
  document.getElementById('speaker1Name').value = name1;
  document.getElementById('speaker2Name').value = name2;

  // Phase 3: Parse each dialogue line
  for (const line of dialogText) {
    if (!line.trim()) continue;
    const m = line.trim().match(/^(.+?):\s*(?:\[(.+?)\])?\s*(.+)$/);
    if (m) {
      const speakerName = m[1].trim();
      const emotion = m[2] || '';
      const txt = m[3] || '';
      const spk = (speakerName === name2) ? 2 : 1;
      const id = ++lineIdCounter;
      dialogueLines.push({ id, speaker: spk, emotion, text: txt });
    }
  }

  if (dialogueLines.length === 0) {
    addDialogueLine(1, '', '');
    addDialogueLine(2, '', '');
    showToast('無法解析對話格式，請確認格式正確', 'error');
  } else {
    renderDialogue();
    showToast(`已匯入 ${dialogueLines.length} 行對話（${name1} / ${name2}）`, 'success');
  }
}

      contents: [{ parts: [{ text: sampleText }] }],
      generationConfig: {
        responseModalities: ['AUDIO'],
        speechConfig: {
          voiceConfig: { prebuiltVoiceConfig: { voiceName: voice } }
        }
      }
    };

      {

    }

        const emotionTag = l.emotion ? ` [${l.emotion}]` : '';
        dialogueText += `${name}:${emotionTag} ${l.text}\n`;
      });

        generationConfig: {
          responseModalities: ['AUDIO'],
          speechConfig: {
            multiSpeakerVoiceConfig: {
              speakerVoiceConfigs: [

                { speaker: s2Name, voiceConfig: { prebuiltVoiceConfig: { voiceName: v2 } } }
              ]
            }
          }
        }
      };
    }

    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`;

    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 180000); // 3 分鐘 timeout

    let response;
    try {
      response = await fetch(url, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-goog-api-key': apiKey
        },
        body: JSON.stringify(requestBody),
        signal: controller.signal
      });
    } catch (fetchErr) {
      clearTimeout(timeoutId);
      if (fetchErr.name === 'AbortError') {
        throw new Error('請求逾時（超過 3 分鐘）。Pro 模型處理長文本較慢，建議改用 Flash 模型，或將文字分段生成。');
      }
      throw fetchErr;
    }
    clearTimeout(timeoutId);

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      const msg = err.error?.message || `HTTP ${response.status}`;
      const hint = response.status === 429
        ? '（配額超限：Pro TTS 免費配額極低，建議改用 Flash 模型或稍後再試）'
        : response.status === 503
        ? '（服務暫時不可用：Pro TTS 仍是 Preview 版本，穩定性較低）'
        : '';
      throw new Error(msg + hint);
    }

    const data = await response.json();
    const audioData = data.candidates?.[0]?.content?.parts?.[0]?.inlineData;

    if (!audioData) throw new Error('回應中沒有音訊資料');

    showToast(`生成失敗: ${err.message}`, 'error');
  } finally {
    btn.disabled = false;
    btnText.innerHTML = '<span class="material-icons-round" style="font-size:18px;">play_arrow</span> 生成語音';
  }
}

// ─── Audio Conversion ───
function base64ToBytes(base64) {
  const bin = atob(base64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

function pcmToWav(pcmData, sampleRate, channels, bitDepth) {
  const byteRate = sampleRate * channels * (bitDepth / 8);
  const blockAlign = channels * (bitDepth / 8);
  const dataSize = pcmData.length;
  const buffer = new ArrayBuffer(44 + dataSize);
  const view = new DataView(buffer);

  // RIFF header
  writeString(view, 0, 'RIFF');
  view.setUint32(4, 36 + dataSize, true);
  writeString(view, 8, 'WAVE');

  // fmt chunk
  writeString(view, 12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true); // PCM
  view.setUint16(22, channels, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, byteRate, true);
  view.setUint16(32, blockAlign, true);
  view.setUint16(34, bitDepth, true);

  // data chunk
  writeString(view, 36, 'data');
  view.setUint32(40, dataSize, true);

  const output = new Uint8Array(buffer);
  output.set(pcmData, 44);

  return new Blob([buffer], { type: 'audio/wav' });
}

function writeString(view, offset, str) {
  for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
}

function downloadAudio() {
  if (!currentAudioBlob) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(currentAudioBlob);
  const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0,19);
  a.download = `tts-${currentTab}-${timestamp}.wav`;
  a.click();
}

async function sendChat() {

  const apiKey = getApiKey();

  input.value = '';

      method: 'POST',

    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || '(無回應)';

    chatHistory.push({ role: 'model', parts: [{ text: reply }] });
    appendChatMsg('assistant', reply, hasDialogueFormat(reply));

  } catch (err) {
    appendChatMsg('system', `錯誤: ${err.message}`);
  } finally {
    sendBtn.disabled = false;
  }

function hasDialogueFormat(text) {

  return /Speaker\s*[12]:/i.test(text) || /^.+?:\s*\[.+?\]/m.test(text);

function appendChatMsg(role, text, showApply = false) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `chat-msg ${role}`;

  // Simple formatting
  let html = escHtml(text);

  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Code blocks
  html = html.replace(/```([\s\S]*?)```/g, '<pre>$1</pre>');
  // Inline code
  html = html.replace(/`(.+?)`/g, '<code style="background:rgba(0,0,0,0.3);padding:1px 4px;border-radius:3px;">$1</code>');

  div.innerHTML = html;

  if (showApply && role === 'assistant') {

    btn.className = 'apply-btn';
    btn.innerHTML = '<span class="material-icons-round" style="font-size:14px;">arrow_forward</span> 套用到對話編輯器';

  container.scrollTop = container.scrollHeight;

// ─── SRT Functions ───
let srtEntries = [];
let srtGenerating = false;

// Drag & drop
document.addEventListener('DOMContentLoaded', () => {
  const zone = document.getElementById('srtUploadZone');
  if (!zone) return;
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });

  zone.addEventListener('drop', e => {

    zone.classList.remove('dragover');

    if (file && file.name.endsWith('.srt')) {
      readSrtFile(file);
    } else {
      showToast('請上傳 .srt 格式檔案', 'error');
    }
  });
});

function handleSrtFile(event) {
  const file = event.target.files[0];
  if (file) readSrtFile(file);
}

function readSrtFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const text = e.target.result;
    document.getElementById('srtPasteArea').value = text;
    parseSrtText(text);
  };
  reader.readAsText(file, 'utf-8');
}

function parseSrtFromPaste() {
  const text = document.getElementById('srtPasteArea').value.trim();
  if (!text) { showToast('請先貼上或上傳 SRT 內容', 'error'); return; }
  parseSrtText(text);
}

function parseSrtText(text) {
  srtEntries = [];
  const blocks = text.replace(/\r\n/g, '\n').split(/\n\n+/);

  for (const block of blocks) {
    const lines = block.trim().split('\n');
    if (lines.length < 2) continue;

    // Find timecode line (contains -->)
    let tcLineIdx = -1;
    for (let i = 0; i < lines.length; i++) {
      if (lines[i].includes('-->')) { tcLineIdx = i; break; }
    }
    if (tcLineIdx === -1) continue;

    const tcLine = lines[tcLineIdx].trim();
    const tcMatch = tcLine.match(/(\d{1,2}:\d{2}:\d{2}[,.:]\d{2,3})\s*-->\s*(\d{1,2}:\d{2}:\d{2}[,.:]\d{2,3})/);
    if (!tcMatch) continue;

    const textContent = lines.slice(tcLineIdx + 1).join('\n').trim();
    if (!textContent) continue;

    const startTC = tcMatch[1];
    const endTC = tcMatch[2];

    srtEntries.push({
      index: srtEntries.length + 1,
      startTC,
      endTC,
      startMs: tcToMs(startTC),
      endMs: tcToMs(endTC),
      text: textContent,
      status: 'pending' // pending, generating, done, error
    });
  }

  if (srtEntries.length === 0) {
    showToast('無法解析 SRT 格式，請確認內容正確', 'error');
    return;
  }

  // Auto-detect timecode offset and shift to 00:00:00
  autoShiftTimecodes();

  renderSrtEntries();
  document.getElementById('srtEntryCount').textContent = `${srtEntries.length} 條字幕`;
  showToast(`已解析 ${srtEntries.length} 條字幕`, 'success');
}

function tcToMs(tc) {
  // Support formats: HH:MM:SS,mmm or HH:MM:SS.mmm or HH:MM:SS:FF (drop frame)
  const cleaned = tc.replace(',', '.').replace(/:(\d{2})$/, '.$1');
  const parts = cleaned.split(/[:.]/);

  let h = 0, m = 0, s = 0, ms = 0;
  if (parts.length === 4) {
    h = parseInt(parts[0]) || 0;
    m = parseInt(parts[1]) || 0;
    s = parseInt(parts[2]) || 0;
    // Handle both milliseconds (3 digits) and frames (2 digits)
    const frac = parts[3];
    if (frac.length <= 2) {
      // Frames at ~25fps (broadcast standard), convert to ms
      ms = Math.round((parseInt(frac) / 25) * 1000);
    } else {
      ms = parseInt(frac) || 0;
    }
  } else if (parts.length === 3) {
    h = parseInt(parts[0]) || 0;
    m = parseInt(parts[1]) || 0;
    s = parseInt(parts[2]) || 0;
  }

  return h * 3600000 + m * 60000 + s * 1000 + ms;
}

function msToTC(ms) {
  const h = Math.floor(ms / 3600000);
  ms %= 3600000;
  const m = Math.floor(ms / 60000);
  ms %= 60000;
  const s = Math.floor(ms / 1000);
  const millis = ms % 1000;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')},${String(millis).padStart(3,'0')}`;
}

function autoShiftTimecodes() {
  if (srtEntries.length === 0) return;

  // Find the minimum start time
  const minStart = Math.min(...srtEntries.map(e => e.startMs));

  // If starts at >= 1 hour (e.g. 01:00:00:00), shift everything down
  if (minStart >= 3600000) {
    // Round down to nearest hour to find the offset
    const hourOffset = Math.floor(minStart / 3600000) * 3600000;
    srtEntries.forEach(e => {
      e.startMs -= hourOffset;
      e.endMs -= hourOffset;
      e.startTC = msToTC(e.startMs);
      e.endTC = msToTC(e.endMs);
    });
    showToast(`Timecode 已自動前移 ${hourOffset / 3600000} 小時，從 00:00:00 開始`, 'success');
  }
}

function renderSrtEntries() {
  const container = document.getElementById('srtEntries');
  container.innerHTML = '';

  const hasErrors = srtEntries.some(e => e.status === 'error');

  // Merge bar at the top (always present when entries loaded)
  if (srtEntries.length > 0) {
    const mergeBar = document.createElement('div');
    mergeBar.className = 'srt-merge-bar';
    mergeBar.innerHTML = `
      <label class="srt-entry-cb" style="display:flex;align-items:center;gap:4px;cursor:pointer;font-size:12px;color:var(--text-secondary);">
        <input type="checkbox" id="srtSelectAll" onchange="srtToggleSelectAll(this.checked)"> 全選
      </label>
      <button class="icon-btn" onclick="srtMergeSelected()" title="合併所選字幕的 timecode 與文字">
        <span class="material-icons-round" style="font-size:16px;">merge</span> 合併所選
      </button>
      <span class="merge-info" id="srtSelectionInfo">已選 0 條</span>
    `;
    container.appendChild(mergeBar);
  }

  srtEntries.forEach(entry => {
    const div = document.createElement('div');
    div.className = `srt-entry ${entry.status}`;
    div.id = `srt-entry-${entry.index}`;

    let statusHtml = '';
    switch (entry.status) {
      case 'pending': statusHtml = '<span class="material-icons-round" style="color:var(--text-secondary)">schedule</span>'; break;
      case 'generating': statusHtml = '<div class="spinner" style="width:16px;height:16px;border-width:2px;border-color:rgba(255,167,38,0.3);border-top-color:var(--warning);"></div>'; break;
      case 'done': statusHtml = '<span class="material-icons-round" style="color:var(--success)">check_circle</span>'; break;
      case 'error': statusHtml = `<button class="srt-retry-btn" onclick="retrySingleEntry(${entry.index})" title="重新生成此條"><span class="material-icons-round" style="font-size:18px;">refresh</span></button>`; break;
    }

    // Escape text for textarea value
    const escapedText = entry.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

    div.innerHTML = `
      <div class="srt-entry-cb">
        <input type="checkbox" data-srt-cb="${entry.index}" onchange="srtUpdateSelectionInfo()">
      </div>
      <div class="srt-entry-index">#${entry.index}</div>
      <div class="srt-entry-tc">${escHtml(entry.startTC)} → ${escHtml(entry.endTC)}</div>
      <div class="srt-entry-text">
        <textarea rows="1" oninput="srtUpdateText(${entry.index}, this.value); srtAutoResize(this)"
          onfocus="srtAutoResize(this)">${escapedText}</textarea>
      </div>
      <div class="srt-entry-actions">
        <button onclick="srtDeleteEntry(${entry.index})" title="刪除此條"><span class="material-icons-round" style="font-size:18px;">close</span></button>
      </div>
      <div class="srt-entry-status">${statusHtml}</div>
    `;
    container.appendChild(div);

    // Auto-resize textarea after append
    const ta = div.querySelector('.srt-entry-text textarea');
    if (ta) {
      ta.style.height = 'auto';
      ta.style.height = ta.scrollHeight + 'px';
    }
  });

  // Show/hide retry-all button
  let retryAllBtn = document.getElementById('srtRetryAllBtn');
  if (hasErrors && !srtGenerating) {
    if (!retryAllBtn) {
      retryAllBtn = document.createElement('button');
      retryAllBtn.id = 'srtRetryAllBtn';
      retryAllBtn.className = 'icon-btn';
      retryAllBtn.style.cssText = 'margin-top:10px;background:var(--accent);border-color:var(--accent);color:white;';
      retryAllBtn.innerHTML = '<span class="material-icons-round">replay</span> 重新生成所有失敗的音檔';
      retryAllBtn.onclick = retryAllFailed;
      container.parentElement.insertBefore(retryAllBtn, container.nextSibling);
    }
  } else if (retryAllBtn) {
    retryAllBtn.remove();
  }

  // Hide paste area when entries are loaded
  document.getElementById('srtPasteArea').style.display = srtEntries.length > 0 ? 'none' : '';
  document.getElementById('srtUploadZone').style.display = srtEntries.length > 0 ? 'none' : '';
}

// ─── SRT Edit / Merge / Delete ───
function srtAutoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function srtUpdateText(entryIndex, newText) {
  const entry = srtEntries.find(e => e.index === entryIndex);
  if (entry) {
    entry.text = newText;
    // If it was already generated, mark as pending since text changed
    if (entry.status === 'done') {
      entry.status = 'pending';
      delete srtAudioMap[entry.index];
      updateSrtEntryUI(entry);
    }
  }
}

function srtDeleteEntry(entryIndex) {
  srtEntries = srtEntries.filter(e => e.index !== entryIndex);
  delete srtAudioMap[entryIndex];
  // Re-number
  srtEntries.forEach((e, i) => { e.index = i + 1; });
  renderSrtEntries();
  document.getElementById('srtEntryCount').textContent = `${srtEntries.length} 條字幕`;
}

function srtToggleSelectAll(checked) {
  document.querySelectorAll('[data-srt-cb]').forEach(cb => { cb.checked = checked; });
  srtUpdateSelectionInfo();
}

function srtUpdateSelectionInfo() {
  const checked = document.querySelectorAll('[data-srt-cb]:checked');
  const info = document.getElementById('srtSelectionInfo');
  if (info) info.textContent = `已選 ${checked.length} 條`;
}

function srtGetSelectedIndices() {
  const indices = [];
  document.querySelectorAll('[data-srt-cb]:checked').forEach(cb => {
    indices.push(parseInt(cb.dataset.srtCb));
  });
  return indices;
}

function srtMergeSelected() {
  const selected = srtGetSelectedIndices();
  if (selected.length < 2) {
    showToast('請至少勾選 2 條字幕來合併', 'error');
    return;
  }

  // Find the actual entries (in their current order)
  const toMerge = srtEntries.filter(e => selected.includes(e.index));
  if (toMerge.length < 2) return;

  // Sort by current order (index)
  toMerge.sort((a, b) => a.index - b.index);

  // Merged result: earliest start → latest end, text concatenated
  const mergedEntry = {
    index: toMerge[0].index,
    startTC: toMerge[0].startTC,
    endTC: toMerge[toMerge.length - 1].endTC,
    startMs: toMerge[0].startMs,
    endMs: toMerge[toMerge.length - 1].endMs,
    text: toMerge.map(e => e.text).join('\n'),
    status: 'pending'
  };

  // Remove merged audio data
  toMerge.forEach(e => { delete srtAudioMap[e.index]; });

  // Replace in array: remove all merged entries, insert merged one at the first position
  const firstIdx = srtEntries.indexOf(toMerge[0]);
  const removeIndices = new Set(toMerge.map(e => e.index));
  srtEntries = srtEntries.filter(e => !removeIndices.has(e.index));
  srtEntries.splice(firstIdx, 0, mergedEntry);

  // Re-number
  srtEntries.forEach((e, i) => { e.index = i + 1; });

  renderSrtEntries();
  document.getElementById('srtEntryCount').textContent = `${srtEntries.length} 條字幕`;
  showToast(`已合併 ${toMerge.length} 條字幕`, 'success');
}

function clearSrt() {
  srtEntries = [];
  srtAudioMap = {};
  document.getElementById('srtEntries').innerHTML = '';
  document.getElementById('srtPasteArea').value = '';
  document.getElementById('srtPasteArea').style.display = '';
  document.getElementById('srtUploadZone').style.display = '';
  document.getElementById('srtProgressBar').classList.add('hidden');
  document.getElementById('srtEntryCount').textContent = '尚未載入';
  document.getElementById('srtFileInput').value = '';
  const retryBtn = document.getElementById('srtRetryAllBtn');
  if (retryBtn) retryBtn.remove();
}

// ─── SRT TTS Generation ───
const SRT_MAX_RETRIES = 3;           // Auto-retry attempts per entry
const SRT_BASE_DELAY = 1500;         // Base delay between requests (ms)
const SRT_429_WAIT = 15000;          // Wait time on 429 rate limit (ms)

// Store PCM data per entry index for reassembly after retries
let srtAudioMap = {}; // { entryIndex: pcmBytes }

async function srtTtsRequest(text, voice, model, apiKey) {
  const requestBody = {
    contents: [{ parts: [{ text }] }],
    generationConfig: {
      responseModalities: ['AUDIO'],
      speechConfig: {
        voiceConfig: { prebuiltVoiceConfig: { voiceName: voice } }
      }
    }
  };

  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 60000);

  const response = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-goog-api-key': apiKey },
      body: JSON.stringify(requestBody),
      signal: controller.signal
    }
  );
  clearTimeout(timeoutId);

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    const status = response.status;
    const msg = err.error?.message || `HTTP ${status}`;
    const error = new Error(msg);
    error.httpStatus = status;
    throw error;
  }

  const data = await response.json();
  const audioData = data.candidates?.[0]?.content?.parts?.[0]?.inlineData;
  if (!audioData) throw new Error('無音訊回應');

  return base64ToBytes(audioData.data);
}

async function generateOneEntry(entry, voice, model, apiKey, tone) {
  const fullText = tone ? `${tone}\n\n${entry.text}` : entry.text;

  for (let attempt = 1; attempt <= SRT_MAX_RETRIES; attempt++) {
    try {
      const pcmBytes = await srtTtsRequest(fullText, voice, model, apiKey);
      srtAudioMap[entry.index] = pcmBytes;
      entry.status = 'done';
      delete entry.errorMsg;
      return true;
    } catch (err) {
      console.warn(`SRT #${entry.index} attempt ${attempt}/${SRT_MAX_RETRIES} failed:`, err.message);

      if (attempt < SRT_MAX_RETRIES) {
        // 429 = rate limit → wait longer; otherwise exponential backoff
        const wait = err.httpStatus === 429
          ? SRT_429_WAIT
          : SRT_BASE_DELAY * Math.pow(2, attempt - 1);
        updateSrtProgress(null, null, `#${entry.index} 失敗，${Math.round(wait/1000)}秒後重試 (${attempt}/${SRT_MAX_RETRIES})...`);
        await new Promise(r => setTimeout(r, wait));
      } else {
        entry.status = 'error';
        entry.errorMsg = err.message;
        return false;
      }
    }
  }
  return false;
}

async function generateSrtSpeech() {
  if (srtEntries.length === 0) {
    showToast('請先載入 SRT 字幕', 'error');
    return;
  }
  const apiKey = getApiKey();
  if (!apiKey) return;
  if (srtGenerating) { showToast('正在生成中，請稍候...', 'error'); return; }

  srtGenerating = true;
  srtAudioMap = {};
  const model = document.getElementById('modelSelect').value;
  const voice = document.getElementById('srtVoiceSelect').value;
  const tone = document.getElementById('srtToneInput').value.trim();

  const btn = document.getElementById('generateBtn');
  const btnText = document.getElementById('generateBtnText');
  btn.disabled = true;
  btnText.innerHTML = '<div class="spinner"></div> SRT 生成中...';

  document.getElementById('srtProgressBar').classList.remove('hidden');

  // Reset all
  srtEntries.forEach(e => { e.status = 'pending'; });
  renderSrtEntries();

  let completed = 0;
  const total = srtEntries.length;

  for (let i = 0; i < srtEntries.length; i++) {
    const entry = srtEntries[i];
    entry.status = 'generating';
    updateSrtEntryUI(entry);
    updateSrtProgress(completed, total, `正在生成第 ${i + 1} / ${total} 條...`);

    await generateOneEntry(entry, voice, model, apiKey, tone);
    completed++;

    updateSrtEntryUI(entry);
    updateSrtProgress(completed, total,
      entry.status === 'error' ? `#${entry.index} 失敗 (${completed}/${total})` : `已完成 ${completed} / ${total}`);

    // Throttle: delay between requests to avoid 429
    if (i < srtEntries.length - 1) {
      await new Promise(r => setTimeout(r, SRT_BASE_DELAY));
    }
  }

  finalizeSrtAudio(total);
}

// Retry a single failed entry, then reassemble
async function retrySingleEntry(entryIndex) {
  const entry = srtEntries.find(e => e.index === entryIndex);
  if (!entry || srtGenerating) return;

  const apiKey = getApiKey();
  if (!apiKey) return;

  srtGenerating = true;
  const model = document.getElementById('modelSelect').value;
  const voice = document.getElementById('srtVoiceSelect').value;
  const tone = document.getElementById('srtToneInput').value.trim();

  entry.status = 'generating';
  updateSrtEntryUI(entry);
  document.getElementById('srtProgressBar').classList.remove('hidden');
  updateSrtProgress(0, 1, `重新生成 #${entryIndex}...`);

  await generateOneEntry(entry, voice, model, apiKey, tone);
  updateSrtEntryUI(entry);

  if (entry.status === 'done') {
    showToast(`#${entryIndex} 重新生成成功`, 'success');
  } else {
    showToast(`#${entryIndex} 仍然失敗: ${entry.errorMsg}`, 'error');
  }

  updateSrtProgress(1, 1, entry.status === 'done' ? '完成' : '失敗');
  renderSrtEntries(); // refresh retry buttons

  // Reassemble if we have any audio
  finalizeSrtAudio(srtEntries.length);
}

// Retry all failed entries, then reassemble
async function retryAllFailed() {
  const failed = srtEntries.filter(e => e.status === 'error');
  if (failed.length === 0 || srtGenerating) return;

  const apiKey = getApiKey();
  if (!apiKey) return;

  srtGenerating = true;
  const model = document.getElementById('modelSelect').value;
  const voice = document.getElementById('srtVoiceSelect').value;
  const tone = document.getElementById('srtToneInput').value.trim();

  const btn = document.getElementById('generateBtn');
  const btnText = document.getElementById('generateBtnText');
  btn.disabled = true;
  btnText.innerHTML = '<div class="spinner"></div> 重新生成失敗項...';

  document.getElementById('srtProgressBar').classList.remove('hidden');

  let completed = 0;
  const total = failed.length;

  for (let i = 0; i < failed.length; i++) {
    const entry = failed[i];
    entry.status = 'generating';
    updateSrtEntryUI(entry);
    updateSrtProgress(completed, total, `重新生成 #${entry.index} (${i + 1}/${total})...`);

    await generateOneEntry(entry, voice, model, apiKey, tone);
    completed++;
    updateSrtEntryUI(entry);
    updateSrtProgress(completed, total,
      entry.status === 'error' ? `#${entry.index} 仍失敗` : `已完成 ${completed} / ${total}`);

    if (i < failed.length - 1) {
      await new Promise(r => setTimeout(r, SRT_BASE_DELAY));
    }
  }

  renderSrtEntries();
  finalizeSrtAudio(srtEntries.length);
}

function finalizeSrtAudio(total) {
  const segments = [];
  srtEntries.forEach(entry => {
    if (srtAudioMap[entry.index]) {
      segments.push({ startMs: entry.startMs, pcmData: srtAudioMap[entry.index] });
    }
  });

  if (segments.length > 0) {
    updateSrtProgress(total, total, '正在合併音訊...');
    try {
      const finalBlob = assembleSrtAudio(segments, 24000);
      currentAudioBlob = finalBlob;

      const audioUrl = URL.createObjectURL(finalBlob);
      const player = document.getElementById('audioPlayer');
      player.src = audioUrl;
      document.getElementById('audioPlayerWrapper').classList.remove('hidden');

      const failCount = srtEntries.filter(e => e.status === 'error').length;
      const successMsg = failCount > 0
        ? `完成！${segments.length} 條成功，${failCount} 條失敗`
        : `全部 ${segments.length} 條字幕語音生成完成！`;
      showToast(successMsg, failCount > 0 ? '' : 'success');
      updateSrtProgress(total, total, successMsg);
    } catch (err) {
      showToast(`音訊合併失敗: ${err.message}`, 'error');
    }
  } else {
    showToast('所有字幕生成均失敗', 'error');
  }

  srtGenerating = false;
  const btn = document.getElementById('generateBtn');
  const btnText = document.getElementById('generateBtnText');
  btn.disabled = false;
  btnText.innerHTML = '<span class="material-icons-round" style="font-size:18px;">play_arrow</span> 生成語音';
}

function assembleSrtAudio(segments, sampleRate) {
  const bytesPerSample = 2;
  const channels = 1;

  // Sort by intended start time
  segments.sort((a, b) => a.startMs - b.startMs);

  // Calculate actual placement: follow timecode, but if previous audio
  // hasn't finished yet, push current to start right after it (no overlap)
  let currentEndByte = 0; // tracks where the last placed audio ends
  const placedSegments = segments.map(seg => {
    const intendedStartByte = Math.floor((seg.startMs / 1000) * sampleRate) * bytesPerSample;
    // Use intended position, but if it overlaps previous, push it after
    const actualStartByte = Math.max(intendedStartByte, currentEndByte);
    const endByte = actualStartByte + seg.pcmData.length;
    currentEndByte = endByte;
    return { startByte: actualStartByte, pcmData: seg.pcmData };
  });

  // Total size
  const totalPcmBytes = currentEndByte;
  const outputPcm = new Uint8Array(totalPcmBytes);

  // Place each segment
  for (const seg of placedSegments) {
    outputPcm.set(seg.pcmData, seg.startByte);
  }

  return pcmToWav(outputPcm, sampleRate, channels, 16);
}

function updateSrtEntryUI(entry) {
  const el = document.getElementById(`srt-entry-${entry.index}`);
  if (!el) return;
  el.className = `srt-entry ${entry.status}`;
  const statusEl = el.querySelector('.srt-entry-status');
  switch (entry.status) {
    case 'pending': statusEl.innerHTML = '<span class="material-icons-round" style="color:var(--text-secondary)">schedule</span>'; break;
    case 'generating': statusEl.innerHTML = '<div class="spinner" style="width:16px;height:16px;border-width:2px;border-color:rgba(255,167,38,0.3);border-top-color:var(--warning);"></div>'; break;
    case 'done': statusEl.innerHTML = '<span class="material-icons-round" style="color:var(--success)">check_circle</span>'; break;
    case 'error': statusEl.innerHTML = `<button class="srt-retry-btn" onclick="retrySingleEntry(${entry.index})" title="重新生成此條"><span class="material-icons-round" style="font-size:18px;">refresh</span></button>`; break;
  }
  // Scroll to the generating entry
  if (entry.status === 'generating') {
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function updateSrtProgress(completed, total, text) {
  document.getElementById('srtProgressText').textContent = text;
  if (completed !== null && total !== null) {
    document.getElementById('srtProgressCount').textContent = `${completed} / ${total}`;
    const pct = total > 0 ? (completed / total * 100) : 0;
    document.getElementById('srtProgressFill').style.width = pct + '%';
  }
}
