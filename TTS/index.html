<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google TTS Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --surface2: #0f3460;
  --primary: #4fc3f7;
  --primary-dark: #0288d1;
  --accent: #e94560;
  --text: #e8e8e8;
  --text-secondary: #a0a0b0;
  --border: #2a2a4a;
  --success: #66bb6a;
  --warning: #ffa726;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Google Sans', 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-left { display:flex; align-items:center; gap:12px; }
.logo {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, #4285f4, #ea4335, #fbbc04, #34a853);
  border-radius: 8px;
  display: flex; align-items:center; justify-content:center;
  font-weight: 700; color: white; font-size: 16px;
}
.header h1 { font-size: 18px; font-weight: 500; }
.header h1 span { color: var(--primary); }

/* API Key bar */
.api-bar {
  display: flex; align-items: center; gap: 8px;
}
.api-bar input {
  width: 280px; padding: 8px 12px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 13px;
  font-family: 'JetBrains Mono', monospace;
}
.api-bar input:focus { outline: none; border-color: var(--primary); }
.api-status {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--accent); transition: background 0.3s;
}
.api-status.connected { background: var(--success); }

/* Main layout */
.main {
  display: grid;
  grid-template-columns: 1fr 400px;
  height: calc(100vh - 57px);
}

/* Left panel - TTS */
.tts-panel {
  display: flex; flex-direction: column;
  border-right: 1px solid var(--border);
  overflow: hidden;
}

/* Tabs */
.tabs {
  display: flex; gap: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.tab {
  padding: 12px 24px;
  cursor: pointer;
  font-size: 14px; font-weight: 500;
  color: var(--text-secondary);
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  display: flex; align-items: center; gap: 8px;
}
.tab:hover { color: var(--text); background: rgba(79,195,247,0.05); }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); }
.tab .material-icons-round { font-size: 18px; }

/* Config bar */
.config-bar {
  display: flex; flex-wrap: wrap; gap: 12px;
  padding: 16px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  align-items: flex-end;
}
.config-group { display: flex; flex-direction: column; gap: 4px; }
.config-group label {
  font-size: 11px; font-weight: 500;
  color: var(--text-secondary); text-transform: uppercase;
  letter-spacing: 0.5px;
}
.config-group select, .config-group input[type="text"] {
  padding: 8px 12px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 13px;
  font-family: 'Google Sans', sans-serif;
  min-width: 160px;
}
.config-group select:focus, .config-group input[type="text"]:focus {
  outline: none; border-color: var(--primary);
}

/* Content area */
.content-area {
  flex: 1; display: flex; flex-direction: column;
  overflow: hidden;
}

/* Single speaker */
.single-panel {
  flex: 1; display: flex; flex-direction: column; padding: 20px;
}
.single-panel textarea {
  flex: 1; resize: none;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
  color: var(--text); font-size: 15px; line-height: 1.8;
  font-family: 'Noto Sans TC', sans-serif;
}
.single-panel textarea:focus { outline: none; border-color: var(--primary); }
.single-panel textarea::placeholder { color: var(--text-secondary); }

/* Tone input */
.tone-input-wrapper {
  margin-bottom: 12px;
}
.tone-input-wrapper textarea {
  width: 100%; height: 60px; resize: none;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px;
  color: var(--warning); font-size: 13px; line-height: 1.5;
  font-family: 'Google Sans', sans-serif;
}
.tone-input-wrapper textarea:focus { outline: none; border-color: var(--warning); }

/* Multi speaker */
.multi-panel {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
}
.multi-config {
  display: flex; gap: 16px; padding: 16px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.speaker-config {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px;
  background: var(--bg); border-radius: 8px;
  border: 1px solid var(--border);
}
.speaker-config .speaker-badge {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
}
.speaker-config:nth-child(1) .speaker-badge { background: #4285f4; color: white; }
.speaker-config:nth-child(2) .speaker-badge { background: #ea4335; color: white; }
.speaker-config input {
  width: 80px; padding: 4px 8px;
  background: transparent; border: 1px solid var(--border);
  border-radius: 4px; color: var(--text); font-size: 13px;
}
.speaker-config input:focus { outline: none; border-color: var(--primary); }
.speaker-config select {
  padding: 4px 8px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 4px; color: var(--text); font-size: 13px;
}

.dialogue-area {
  flex: 1; overflow-y: auto; padding: 16px 20px;
}
.dialogue-line {
  display: flex; gap: 12px; margin-bottom: 8px;
  align-items: flex-start;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

.dialogue-line .line-badge {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; flex-shrink: 0;
  margin-top: 4px; cursor: pointer;
  transition: transform 0.15s;
}
.dialogue-line .line-badge:hover { transform: scale(1.1); }
.dialogue-line .line-badge.s1 { background: #4285f4; color: white; }
.dialogue-line .line-badge.s2 { background: #ea4335; color: white; }

.dialogue-line .line-content {
  flex: 1; display: flex; flex-direction: column; gap: 4px;
}
.dialogue-line .line-emotion {
  display: flex; align-items: center; gap: 4px;
}
.dialogue-line .line-emotion input {
  width: 140px; padding: 3px 8px;
  background: transparent; border: 1px solid var(--border);
  border-radius: 4px; color: var(--warning); font-size: 12px;
  font-style: italic;
}
.dialogue-line .line-emotion input:focus { outline: none; border-color: var(--warning); }
.dialogue-line .line-text {
  width: 100%; padding: 8px 12px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 14px;
  font-family: 'Noto Sans TC', sans-serif;
  resize: none; min-height: 40px; line-height: 1.6;
  overflow: hidden;
}
.dialogue-line .line-text:focus { outline: none; border-color: var(--primary); }
.dialogue-line .line-actions {
  display: flex; gap: 4px; flex-shrink: 0; margin-top: 4px;
}
.dialogue-line .line-actions button {
  width: 28px; height: 28px; border: none;
  background: transparent; color: var(--text-secondary);
  border-radius: 4px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.dialogue-line .line-actions button:hover { background: var(--surface2); color: var(--text); }

.add-line-bar {
  display: flex; gap: 8px; padding: 12px 20px;
  border-top: 1px solid var(--border);
  background: var(--surface);
}
.add-line-bar button {
  flex: 1; padding: 10px;
  border: 1px dashed var(--border);
  background: transparent; color: var(--text-secondary);
  border-radius: 8px; cursor: pointer; font-size: 13px;
  font-family: 'Google Sans', sans-serif;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 4px;
}
.add-line-bar button:hover {
  border-color: var(--primary); color: var(--primary);
  background: rgba(79,195,247,0.05);
}

/* Bottom bar */
.bottom-bar {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 20px;
  background: var(--surface);
  border-top: 1px solid var(--border);
}
.generate-btn {
  padding: 10px 28px;
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
  border: none; border-radius: 24px;
  color: white; font-size: 14px; font-weight: 500;
  cursor: pointer; font-family: 'Google Sans', sans-serif;
  display: flex; align-items: center; gap: 8px;
  transition: all 0.2s;
  box-shadow: 0 2px 12px rgba(79,195,247,0.3);
}
.generate-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(79,195,247,0.4); }
.generate-btn:active { transform: translateY(0); }
.generate-btn:disabled {
  opacity: 0.5; cursor: not-allowed; transform: none;
  box-shadow: none;
}
.generate-btn .material-icons-round { font-size: 18px; }

.audio-player-wrapper {
  flex: 1; display: flex; align-items: center; gap: 8px;
}
.audio-player-wrapper audio { flex: 1; height: 36px; }
.download-btn {
  padding: 8px 16px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 13px;
  cursor: pointer; font-family: 'Google Sans', sans-serif;
  display: flex; align-items: center; gap: 4px;
  transition: all 0.2s;
}
.download-btn:hover { border-color: var(--primary); color: var(--primary); }
.download-btn .material-icons-round { font-size: 16px; }
.hidden { display: none !important; }

/* Progress */
.progress-bar {
  height: 3px; background: var(--border);
  position: relative; overflow: hidden;
  border-radius: 2px;
}
.progress-bar .fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  width: 0%; transition: width 0.3s;
}
.progress-bar.indeterminate .fill {
  width: 30%;
  animation: indeterminate 1.5s infinite;
}
@keyframes indeterminate {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(400%); }
}

/* Right panel - Chat */
.chat-panel {
  display: flex; flex-direction: column;
  background: var(--surface);
  overflow: hidden;
}
.chat-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.chat-header h2 {
  font-size: 14px; font-weight: 500;
  display: flex; align-items: center; gap: 8px;
}
.chat-header h2 .material-icons-round { font-size: 18px; color: var(--primary); }
.chat-header .chat-actions { display: flex; gap: 4px; }
.chat-header button {
  padding: 6px; border: none;
  background: transparent; color: var(--text-secondary);
  border-radius: 6px; cursor: pointer;
  display: flex; align-items: center;
}
.chat-header button:hover { background: var(--bg); color: var(--text); }

.chat-messages {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 12px;
}
.chat-msg {
  padding: 10px 14px;
  border-radius: var(--radius);
  font-size: 13px; line-height: 1.7;
  max-width: 95%; white-space: pre-wrap;
  word-break: break-word;
  animation: fadeIn 0.3s ease;
}
.chat-msg.user {
  background: var(--surface2);
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.chat-msg.assistant {
  background: var(--bg);
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}
.chat-msg.system {
  background: rgba(79,195,247,0.1);
  border: 1px solid rgba(79,195,247,0.2);
  align-self: center;
  text-align: center;
  font-size: 12px;
  color: var(--text-secondary);
}
.chat-msg pre {
  background: rgba(0,0,0,0.3);
  padding: 8px 12px; border-radius: 6px;
  overflow-x: auto; margin: 8px 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
}
.chat-msg .apply-btn {
  margin-top: 8px;
  padding: 6px 14px;
  background: var(--primary-dark);
  border: none; border-radius: 6px;
  color: white; font-size: 12px;
  cursor: pointer; font-family: 'Google Sans', sans-serif;
  display: inline-flex; align-items: center; gap: 4px;
}
.chat-msg .apply-btn:hover { background: var(--primary); }

.chat-input-area {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex; gap: 8px;
}
.chat-input-area textarea {
  flex: 1; resize: none;
  padding: 10px 14px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text);
  font-size: 13px; line-height: 1.5;
  font-family: 'Noto Sans TC', 'Google Sans', sans-serif;
  max-height: 120px;
}
.chat-input-area textarea:focus { outline: none; border-color: var(--primary); }
.chat-input-area textarea::placeholder { color: var(--text-secondary); }
.chat-send-btn {
  width: 40px; height: 40px;
  background: var(--primary); border: none;
  border-radius: 50%; color: white;
  cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  transition: all 0.2s; align-self: flex-end;
}
.chat-send-btn:hover { background: var(--primary-dark); transform: scale(1.05); }
.chat-send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

/* Responsive */
@media (max-width: 900px) {
  .main { grid-template-columns: 1fr; }
  .chat-panel { display: none; }
  .chat-panel.mobile-open { display: flex; position: fixed; inset: 57px 0 0 0; z-index: 50; }
}

/* Toast */
.toast-container {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%);
  z-index: 999; display: flex;
  flex-direction: column; gap: 8px;
  align-items: center;
}
.toast {
  padding: 10px 20px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px; font-size: 13px;
  box-shadow: var(--shadow);
  animation: toastIn 0.3s ease;
}
.toast.error { border-color: var(--accent); color: var(--accent); }
.toast.success { border-color: var(--success); color: var(--success); }
@keyframes toastIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

/* Loading spinner in button */
.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Import/Export buttons */
.import-export-bar {
  display: flex; gap: 4px; margin-left: auto;
}
.icon-btn {
  padding: 6px 10px;
  background: transparent; border: 1px solid var(--border);
  border-radius: 6px; color: var(--text-secondary);
  cursor: pointer; font-size: 12px;
  font-family: 'Google Sans', sans-serif;
  display: flex; align-items: center; gap: 4px;
  transition: all 0.15s;
}
.icon-btn:hover { border-color: var(--primary); color: var(--primary); }
.icon-btn .material-icons-round { font-size: 14px; }

/* Gender badge */
.gender-badge {
  font-size: 13px; font-weight: 700;
  width: 20px; text-align: center; flex-shrink: 0;
}
.gender-female { color: #f48fb1; }
.gender-male   { color: #90caf9; }

/* Voice preview */
.voice-select-row {
  display: flex; align-items: center; gap: 4px;
}
.voice-preview-btn {
  width: 30px; height: 30px; flex-shrink: 0;
  background: transparent; border: none;
  color: var(--text-secondary); cursor: pointer;
  border-radius: 50%; display: flex;
  align-items: center; justify-content: center;
  transition: all 0.15s;
  padding: 0;
}
.voice-preview-btn:hover { color: var(--primary); background: rgba(79,195,247,0.1); }
.voice-preview-btn.loading { color: var(--warning); animation: pulse 1s infinite; }
.voice-preview-btn.playing { color: var(--success); }
.voice-preview-btn .material-icons-round { font-size: 22px; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* View toggle */
.view-toggle { display: flex; gap: 2px; }
.view-btn.active {
  background: var(--primary-dark); border-color: var(--primary-dark);
  color: white;
}
.view-btn.active:hover { background: var(--primary); }

/* Script view */
.script-view {
  flex: 1; display: flex; flex-direction: column;
  padding: 0; overflow: hidden;
}
.script-hint {
  padding: 10px 20px;
  background: rgba(79,195,247,0.08);
  border-bottom: 1px solid rgba(79,195,247,0.15);
  font-size: 12px; color: var(--primary);
  display: flex; align-items: center; gap: 6px;
}
.script-view textarea {
  flex: 1; resize: none;
  background: var(--bg); border: none;
  padding: 16px 20px;
  color: var(--text); font-size: 14px; line-height: 1.8;
  font-family: 'JetBrains Mono', 'Noto Sans TC', monospace;
  border-bottom: 1px solid var(--border);
}
.script-view textarea:focus { outline: none; }
.script-view textarea::placeholder { color: var(--text-secondary); font-size: 13px; }
.script-actions {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 20px;
  background: var(--surface);
}
.script-line-count {
  font-size: 12px; color: var(--text-secondary);
  margin-left: auto;
}

/* Editor view */
.editor-view {
  flex: 1; display: flex; flex-direction: column;
  overflow: hidden;
}

/* Text format modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; animation: fadeIn 0.2s;
}
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px; width: 90%; max-width: 600px;
  max-height: 80vh; overflow-y: auto;
  box-shadow: var(--shadow);
}
.modal h3 { margin-bottom: 12px; font-size: 16px; }
.modal textarea {
  width: 100%; min-height: 300px; resize: vertical;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px;
  color: var(--text); font-size: 13px;
  font-family: 'JetBrains Mono', monospace;
  line-height: 1.6;
}
.modal textarea:focus { outline: none; border-color: var(--primary); }
.modal-actions {
  display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end;
}
.modal-actions button {
  padding: 8px 18px;
  border-radius: 8px; font-size: 13px;
  cursor: pointer; font-family: 'Google Sans', sans-serif;
  border: 1px solid var(--border);
  transition: all 0.15s;
}
.modal-actions .cancel { background: transparent; color: var(--text-secondary); }
.modal-actions .cancel:hover { color: var(--text); }
.modal-actions .confirm { background: var(--primary); border-color: var(--primary); color: white; }
.modal-actions .confirm:hover { background: var(--primary-dark); }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="logo">G</div>
    <h1>Google <span>TTS Studio</span></h1>
  </div>
  <div class="api-bar">
    <select id="modelSelect" style="padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:'Google Sans',sans-serif;">
      <option value="gemini-2.5-flash-preview-tts">Gemini 2.5 Flash TTS</option>
      <option value="gemini-2.5-pro-preview-tts">Gemini 2.5 Pro TTS</option>
    </select>
    <div class="api-status" id="apiStatus" title="API 未連接"></div>
    <input type="password" id="apiKeyInput" placeholder="Enter Gemini API Key..." spellcheck="false">
    <button class="icon-btn" onclick="toggleApiKeyVisibility()" title="顯示/隱藏 API Key">
      <span class="material-icons-round" id="apiKeyToggleIcon">visibility</span>
    </button>
  </div>
</div>

<!-- Main -->
<div class="main">
  <!-- Left: TTS Panel -->
  <div class="tts-panel">
    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" data-tab="single" onclick="switchTab('single')">
        <span class="material-icons-round">person</span> 單人語音
      </div>
      <div class="tab" data-tab="multi" onclick="switchTab('multi')">
        <span class="material-icons-round">group</span> 雙人對話
      </div>
    </div>

    <!-- Config Bar -->
    <div class="config-bar" id="singleConfig">
      <div class="config-group">
        <label>語音</label>
        <div class="voice-select-row">
          <select id="voiceSelect"></select>
          <button class="voice-preview-btn" onclick="previewVoice('voiceSelect', this)" title="試聽這個語音">
            <span class="material-icons-round">play_circle</span>
          </button>
        </div>
      </div>

<script>
// ─── Voices ───
const VOICE_FEMALE = [
  'Zephyr','Kore','Leda','Aoede','Callirrhoe','Autonoe','Despina',
  'Erinome','Laomedeia','Achernar','Gacrux','Pulcherrima','Vindemiatrix','Sulafat'
];
const VOICE_MALE = [
  'Puck','Charon','Fenrir','Orus','Enceladus','Iapetus','Umbriel','Algieba',
  'Algenib','Rasalgethi','Alnilam','Schedar','Achird','Zubenelgenubi',
  'Sadachbia','Sadaltager'
];

function voiceGender(name) {
  if (VOICE_FEMALE.includes(name)) return 'female';
  if (VOICE_MALE.includes(name)) return 'male';
  return 'unknown';
}

// Populate voice selects with gender grouping
function populateVoices() {
  ['voiceSelect','voice1Select','voice2Select'].forEach((id, idx) => {
    const sel = document.getElementById(id);
    sel.innerHTML = '';

    const femaleGroup = document.createElement('optgroup');
    femaleGroup.label = '♀ 女聲 Female';
    VOICE_FEMALE.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v; opt.textContent = v;
      femaleGroup.appendChild(opt);
    });

    const maleGroup = document.createElement('optgroup');
    maleGroup.label = '♂ 男聲 Male';
    VOICE_MALE.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v; opt.textContent = v;
      maleGroup.appendChild(opt);
    });

    sel.appendChild(femaleGroup);
    sel.appendChild(maleGroup);

    if (idx === 0) sel.value = 'Kore';
    if (idx === 1) sel.value = 'Aoede';
    if (idx === 2) sel.value = 'Charon';

    // Update gender badge on change
    sel.addEventListener('change', () => updateGenderBadge(sel));
    updateGenderBadge(sel);
  });
}

function updateGenderBadge(sel) {
  const gender = voiceGender(sel.value);
  const row = sel.closest('.voice-select-row');
  if (!row) return;
  let badge = row.querySelector('.gender-badge');
  if (!badge) {
    badge = document.createElement('span');
    badge.className = 'gender-badge';
    sel.insertAdjacentElement('beforebegin', badge);
  }
  badge.textContent = gender === 'female' ? '♀' : gender === 'male' ? '♂' : '';
  badge.className = `gender-badge gender-${gender}`;
}

populateVoices();

// ─── API Key ───
const apiKeyInput = document.getElementById('apiKeyInput');
const apiStatus = document.getElementById('apiStatus');

// Load saved key
const savedKey = localStorage.getItem('gemini_api_key');
if (savedKey) { apiKeyInput.value = savedKey; apiStatus.classList.add('connected'); apiStatus.title = 'API Key 已設定'; }

apiKeyInput.addEventListener('input', () => {
  const key = apiKeyInput.value.trim();
  localStorage.setItem('gemini_api_key', key);
  if (key) { apiStatus.classList.add('connected'); apiStatus.title = 'API Key 已設定'; }
  else { apiStatus.classList.remove('connected'); apiStatus.title = 'API 未連接'; }
});

function toggleApiKeyVisibility() {
  const inp = document.getElementById('apiKeyInput');
  const icon = document.getElementById('apiKeyToggleIcon');
  if (inp.type === 'password') { inp.type = 'text'; icon.textContent = 'visibility_off'; }
  else { inp.type = 'password'; icon.textContent = 'visibility'; }
}

function getApiKey() {
  const k = apiKeyInput.value.trim();
  if (!k) { showToast('請先輸入 Gemini API Key', 'error'); return null; }
  return k;
}

// ─── Tabs ───
let currentTab = 'single';
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('singleContent').classList.toggle('hidden', tab !== 'single');
  document.getElementById('multiContent').classList.toggle('hidden', tab !== 'multi');
  document.getElementById('singleConfig').classList.toggle('hidden', tab !== 'single');
  document.getElementById('chatPanel').classList.toggle('hidden', tab !== 'multi');
}

// ─── View Toggle (Script / Editor) ───
let currentView = 'editor';

function switchView(view) {
  currentView = view;
  document.getElementById('viewBtnEditor').classList.toggle('active', view === 'editor');
  document.getElementById('viewBtnScript').classList.toggle('active', view === 'script');
  document.getElementById('editorView').classList.toggle('hidden', view !== 'editor');
  document.getElementById('scriptView').classList.toggle('hidden', view !== 'script');

  if (view === 'script') {
    // Sync editor → script textarea
    syncEditorToScript();
  } else {
    // When switching back to editor, auto-parse script if it has content
    const scriptText = document.getElementById('scriptTextarea').value.trim();
    if (scriptText) {
      parseDialogueText(scriptText);
    }
  }
}

function syncEditorToScript() {
  const s1 = document.getElementById('speaker1Name').value || 'Speaker 1';
  const s2 = document.getElementById('speaker2Name').value || 'Speaker 2';
  const tone = document.getElementById('multiToneInput').value.trim();
  let text = '';
  if (tone) text += tone + '\n\n';
  dialogueLines.forEach(l => {
    if (!l.text.trim() && !l.emotion) return;
    const name = l.speaker === 1 ? s1 : s2;
    const emotionTag = l.emotion ? ` [${l.emotion}]` : '';
    text += `${name}:${emotionTag} ${l.text}\n\n`;
  });
  document.getElementById('scriptTextarea').value = text.trimEnd();
  updateScriptLineCount();
}

function parseScriptAndSwitch() {
  const scriptText = document.getElementById('scriptTextarea').value.trim();
  if (!scriptText) { showToast('請先貼上對話稿', 'error'); return; }
  parseDialogueText(scriptText);
  switchView('editor');
}

function updateScriptLineCount() {
  const text = document.getElementById('scriptTextarea').value;
  const lines = text.split('\n').filter(l => /^.+?:\s*(\[.+?\])?\s*.+/.test(l.trim()));
  document.getElementById('scriptLineCount').textContent = `${lines.length} 行對話`;
}

// Auto-parse on paste in script view
document.addEventListener('DOMContentLoaded', () => {
  const scriptTa = document.getElementById('scriptTextarea');
  if (scriptTa) {
    scriptTa.addEventListener('paste', () => {
      // Wait for paste content to populate
      setTimeout(() => {
        updateScriptLineCount();
        // Auto-preview: parse and show count
        const text = scriptTa.value.trim();
        if (text) {
          const lines = text.split('\n').filter(l => /^.+?:\s*(\[.+?\])?\s*.+/.test(l.trim()));
          if (lines.length >= 2) {
            showToast(`偵測到 ${lines.length} 行對話，點擊「解析」或直接切回編輯器`, 'success');
          }
        }
      }, 50);
    });
    scriptTa.addEventListener('input', () => updateScriptLineCount());
  }
});

// ─── Dialogue Lines ───
let dialogueLines = [];
let lineIdCounter = 0;

function addDialogueLine(speaker, emotion = '', text = '') {
  const id = ++lineIdCounter;
  dialogueLines.push({ id, speaker, emotion, text });
  renderDialogue();
  // Focus new line
  setTimeout(() => {
    const el = document.querySelector(`[data-line-id="${id}"] .line-text`);
    if (el) el.focus();
  }, 50);
}

function removeDialogueLine(id) {
  dialogueLines = dialogueLines.filter(l => l.id !== id);
  renderDialogue();
}

function toggleSpeaker(id) {
  const line = dialogueLines.find(l => l.id === id);
  if (line) { line.speaker = line.speaker === 1 ? 2 : 1; renderDialogue(); }
}

function renderDialogue() {
  const area = document.getElementById('dialogueArea');
  area.innerHTML = '';
  dialogueLines.forEach(line => {
    const div = document.createElement('div');
    div.className = 'dialogue-line';
    div.dataset.lineId = line.id;
    div.innerHTML = `
      <div class="line-badge s${line.speaker}" onclick="toggleSpeaker(${line.id})" title="點擊切換講者">
        S${line.speaker}
      </div>
      <div class="line-content">
        <div class="line-emotion">
          <input type="text" value="${escHtml(line.emotion)}" placeholder="情緒 e.g. eager"
            oninput="updateLine(${line.id},'emotion',this.value)">
        </div>
        <textarea class="line-text" placeholder="輸入對話..."
          oninput="updateLine(${line.id},'text',this.value); autoResize(this)"
          onkeydown="handleLineKeydown(event, ${line.id})">${escHtml(line.text)}</textarea>
      </div>
      <div class="line-actions">
        <button onclick="moveLineUp(${line.id})" title="上移"><span class="material-icons-round">arrow_upward</span></button>
        <button onclick="moveLineDown(${line.id})" title="下移"><span class="material-icons-round">arrow_downward</span></button>
        <button onclick="removeDialogueLine(${line.id})" title="刪除"><span class="material-icons-round">close</span></button>
      </div>
    `;
    area.appendChild(div);
    // Auto resize text
    const ta = div.querySelector('.line-text');
    autoResize(ta);
  });
  area.scrollTop = area.scrollHeight;
}

function updateLine(id, field, value) {
  const line = dialogueLines.find(l => l.id === id);
  if (line) line[field] = value;
}

function handleLineKeydown(e, id) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const line = dialogueLines.find(l => l.id === id);
    addDialogueLine(line.speaker === 1 ? 2 : 1);
  }
}

function moveLineUp(id) {
  const idx = dialogueLines.findIndex(l => l.id === id);
  if (idx > 0) { [dialogueLines[idx-1], dialogueLines[idx]] = [dialogueLines[idx], dialogueLines[idx-1]]; renderDialogue(); }
}
function moveLineDown(id) {
  const idx = dialogueLines.findIndex(l => l.id === id);
  if (idx < dialogueLines.length - 1) { [dialogueLines[idx+1], dialogueLines[idx]] = [dialogueLines[idx], dialogueLines[idx+1]]; renderDialogue(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Init with a couple lines
addDialogueLine(1, 'eager', '');
addDialogueLine(2, '', '');

// ─── Import/Export ───
function exportDialogue() {
  const s1 = document.getElementById('speaker1Name').value || 'Speaker 1';
  const s2 = document.getElementById('speaker2Name').value || 'Speaker 2';
  const tone = document.getElementById('multiToneInput').value.trim();
  let text = '';
  if (tone) text += tone + '\n\n';
  dialogueLines.forEach(l => {
    const name = l.speaker === 1 ? s1 : s2;
    const emotionTag = l.emotion ? ` [${l.emotion}]` : '';
    text += `${name}:${emotionTag} ${l.text}\n\n`;
  });
  // Copy to clipboard
  navigator.clipboard.writeText(text.trim()).then(() => {
    showToast('對話稿已複製到剪貼簿', 'success');
  });
}

function parseDialogueText(text) {
  dialogueLines = [];
  lineIdCounter = 0;

  const lines = text.split('\n');
  let toneLines = [];
  let dialogueStarted = false;
  let dialogText = [];

  // Phase 1: Separate tone/style lines from dialogue lines
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) { if (dialogueStarted) dialogText.push(''); continue; }
    // Match "SpeakerName: [emotion] text" or "SpeakerName: text"
    const speakerMatch = trimmed.match(/^(.+?):\s*(?:\[(.+?)\])?\s*(.+)$/);
    if (speakerMatch) {
      dialogueStarted = true;
      dialogText.push(trimmed);
    } else if (!dialogueStarted) {
      toneLines.push(trimmed);
    }
    // Non-matching lines after dialogue started are ignored (blank separators)
  }

  if (toneLines.length > 0) {
    document.getElementById('multiToneInput').value = toneLines.join('\n');
  }

  // Phase 2: Detect unique speaker names automatically
  let speakerNames = [];
  for (const line of dialogText) {
    if (!line.trim()) continue;
    const m = line.trim().match(/^(.+?):\s*(?:\[.+?\])?\s*.+$/);
    if (m) {
      const name = m[1].trim();
      if (!speakerNames.includes(name)) speakerNames.push(name);
    }
  }
  // First unique name = Speaker 1, second = Speaker 2
  const name1 = speakerNames[0] || 'Speaker 1';
  const name2 = speakerNames[1] || 'Speaker 2';
  document.getElementById('speaker1Name').value = name1;
  document.getElementById('speaker2Name').value = name2;

  // Phase 3: Parse each dialogue line
  for (const line of dialogText) {
    if (!line.trim()) continue;
    const m = line.trim().match(/^(.+?):\s*(?:\[(.+?)\])?\s*(.+)$/);
    if (m) {
      const speakerName = m[1].trim();
      const emotion = m[2] || '';
      const txt = m[3] || '';
      const spk = (speakerName === name2) ? 2 : 1;
      const id = ++lineIdCounter;
      dialogueLines.push({ id, speaker: spk, emotion, text: txt });
    }
  }

  if (dialogueLines.length === 0) {
    addDialogueLine(1, '', '');
    addDialogueLine(2, '', '');
    showToast('無法解析對話格式，請確認格式正確', 'error');
  } else {
    renderDialogue();
    showToast(`已匯入 ${dialogueLines.length} 行對話（${name1} / ${name2}）`, 'success');
  }
}

// ─── Voice Preview ───
let previewAudio = null;

async function previewVoice(selectId, btn) {
  const apiKey = getApiKey();
  if (!apiKey) return;

  // 若正在播放同一個，停止
  if (previewAudio && !previewAudio.ended) {
    previewAudio.pause();
    previewAudio = null;
    btn.classList.remove('playing', 'loading');
    btn.querySelector('.material-icons-round').textContent = 'play_circle';
    return;
  }

  const voice = document.getElementById(selectId).value;
  const model = document.getElementById('modelSelect').value;
  const sampleText = `你好，我是 ${voice}。很高興為你服務，希望你喜歡我的聲音。`;

  btn.classList.add('loading');
  btn.querySelector('.material-icons-round').textContent = 'hourglass_top';

  try {
    const requestBody = {
      contents: [{ parts: [{ text: sampleText }] }],
      generationConfig: {
        responseModalities: ['AUDIO'],
        speechConfig: {
          voiceConfig: { prebuiltVoiceConfig: { voiceName: voice } }
        }
      }
    };

    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 30000);

    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-goog-api-key': apiKey },
        body: JSON.stringify(requestBody),
        signal: controller.signal
      }
    );
    clearTimeout(timeoutId);

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${response.status}`);
    }

    const data = await response.json();
    const audioData = data.candidates?.[0]?.content?.parts?.[0]?.inlineData;
    if (!audioData) throw new Error('無音訊回應');

    const pcmBytes = base64ToBytes(audioData.data);
    const wavBlob = pcmToWav(pcmBytes, 24000, 1, 16);
    const audioUrl = URL.createObjectURL(wavBlob);

    previewAudio = new Audio(audioUrl);
    btn.classList.remove('loading');
    btn.classList.add('playing');
    btn.querySelector('.material-icons-round').textContent = 'stop_circle';

    previewAudio.play();
    previewAudio.onended = () => {
      btn.classList.remove('playing');
      btn.querySelector('.material-icons-round').textContent = 'play_circle';
    };

  } catch (err) {
    btn.classList.remove('loading', 'playing');
    btn.querySelector('.material-icons-round').textContent = 'play_circle';
    showToast(`試聽失敗: ${err.message}`, 'error');
  }
}

// ─── Generate Speech ───
let currentAudioBlob = null;

async function generateSpeech() {
  const apiKey = getApiKey();
  if (!apiKey) return;

  const model = document.getElementById('modelSelect').value;
  const btn = document.getElementById('generateBtn');
  const btnText = document.getElementById('generateBtnText');

  btn.disabled = true;
  btnText.innerHTML = '<div class="spinner"></div> 生成中...';

  try {
    let requestBody;

    if (currentTab === 'single') {
      const voice = document.getElementById('voiceSelect').value;
      const tone = document.getElementById('toneInput').value.trim();
      const text = document.getElementById('singleText').value.trim();
      if (!text) { showToast('請輸入文字', 'error'); return; }

      const fullText = tone ? `${tone}\n\n${text}` : text;
      requestBody = {
        contents: [{ parts: [{ text: fullText }] }],
        generationConfig: {
          responseModalities: ['AUDIO'],
          speechConfig: {
            voiceConfig: {
              prebuiltVoiceConfig: { voiceName: voice }
            }
          }
        }
      };
    } else {
      // Multi-speaker — if in script view, parse first
      if (currentView === 'script') {
        const scriptText = document.getElementById('scriptTextarea').value.trim();
        if (scriptText) parseDialogueText(scriptText);
      }
      const s1Name = document.getElementById('speaker1Name').value || 'Speaker 1';
      const s2Name = document.getElementById('speaker2Name').value || 'Speaker 2';
      const v1 = document.getElementById('voice1Select').value;
      const v2 = document.getElementById('voice2Select').value;
      const tone = document.getElementById('multiToneInput').value.trim();

      if (dialogueLines.length === 0 || dialogueLines.every(l => !l.text.trim())) {
        showToast('請輸入對話內容', 'error'); return;
      }

      // Build dialogue text
      let dialogueText = '';
      if (tone) dialogueText += tone + '\n\n';
      dialogueLines.forEach(l => {
        if (!l.text.trim()) return;
        const name = l.speaker === 1 ? s1Name : s2Name;
        const emotionTag = l.emotion ? ` [${l.emotion}]` : '';
        dialogueText += `${name}:${emotionTag} ${l.text}\n`;
      });

      requestBody = {
        contents: [{ parts: [{ text: dialogueText.trim() }] }],
        generationConfig: {
          responseModalities: ['AUDIO'],
          speechConfig: {
            multiSpeakerVoiceConfig: {
              speakerVoiceConfigs: [
                { speaker: s1Name, voiceConfig: { prebuiltVoiceConfig: { voiceName: v1 } } },
                { speaker: s2Name, voiceConfig: { prebuiltVoiceConfig: { voiceName: v2 } } }
              ]
            }
          }
        }
      };
    }

    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`;

    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 180000); // 3 分鐘 timeout

    let response;
    try {
      response = await fetch(url, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-goog-api-key': apiKey
        },
        body: JSON.stringify(requestBody),
        signal: controller.signal
      });
    } catch (fetchErr) {
      clearTimeout(timeoutId);
      if (fetchErr.name === 'AbortError') {
        throw new Error('請求逾時（超過 3 分鐘）。Pro 模型處理長文本較慢，建議改用 Flash 模型，或將文字分段生成。');
      }
      throw fetchErr;
    }
    clearTimeout(timeoutId);

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      const msg = err.error?.message || `HTTP ${response.status}`;
      const hint = response.status === 429
        ? '（配額超限：Pro TTS 免費配額極低，建議改用 Flash 模型或稍後再試）'
        : response.status === 503
        ? '（服務暫時不可用：Pro TTS 仍是 Preview 版本，穩定性較低）'
        : '';
      throw new Error(msg + hint);
    }

    const data = await response.json();
    const audioData = data.candidates?.[0]?.content?.parts?.[0]?.inlineData;

    if (!audioData) throw new Error('回應中沒有音訊資料');

    // Convert base64 PCM to WAV
    const pcmBytes = base64ToBytes(audioData.data);
    const wavBlob = pcmToWav(pcmBytes, 24000, 1, 16);
    currentAudioBlob = wavBlob;

    const audioUrl = URL.createObjectURL(wavBlob);
    const player = document.getElementById('audioPlayer');
    player.src = audioUrl;
    document.getElementById('audioPlayerWrapper').classList.remove('hidden');
    player.play();

    showToast('語音生成成功！', 'success');

  } catch (err) {
    console.error(err);
    showToast(`生成失敗: ${err.message}`, 'error');
  } finally {
    btn.disabled = false;
    btnText.innerHTML = '<span class="material-icons-round" style="font-size:18px;">play_arrow</span> 生成語音';
  }
}

// ─── Audio Conversion ───
function base64ToBytes(base64) {
  const bin = atob(base64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

function pcmToWav(pcmData, sampleRate, channels, bitDepth) {
  const byteRate = sampleRate * channels * (bitDepth / 8);
  const blockAlign = channels * (bitDepth / 8);
  const dataSize = pcmData.length;
  const buffer = new ArrayBuffer(44 + dataSize);
  const view = new DataView(buffer);

  // RIFF header
  writeString(view, 0, 'RIFF');
  view.setUint32(4, 36 + dataSize, true);
  writeString(view, 8, 'WAVE');

  // fmt chunk
  writeString(view, 12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true); // PCM
  view.setUint16(22, channels, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, byteRate, true);
  view.setUint16(32, blockAlign, true);
  view.setUint16(34, bitDepth, true);

  // data chunk
  writeString(view, 36, 'data');
  view.setUint32(40, dataSize, true);

  const output = new Uint8Array(buffer);
  output.set(pcmData, 44);

  return new Blob([buffer], { type: 'audio/wav' });
}

function writeString(view, offset, str) {
  for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
}

function downloadAudio() {
  if (!currentAudioBlob) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(currentAudioBlob);
  const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0,19);
  a.download = `tts-${currentTab}-${timestamp}.wav`;
  a.click();
}

// ─── Chat (LLM Script Assistant) ───
let chatHistory = [];

const SYSTEM_PROMPT = `你是一個專業的 TTS 對話稿助手。你的工作是幫用戶創建適合 Text-to-Speech 系統的雙人對話稿。

你產生的對話稿必須嚴格遵循以下格式：

1. 開頭可以有語氣/風格描述（1-2行）
2. 對話格式為：Speaker 1: [情緒] 對話文字
3. 情緒標籤用方括號 [] 包裹，例如 [eager], [confused], [shouting]
4. 每行一句對話
5. Speaker 1 和 Speaker 2 交替出現

範例格式：
台灣的舞台劇表演，節奏快，情緒多變
Read aloud in a humorous Taiwanese Mandarin tone

Speaker 1: [eager] 你今天想吃什麼？
Speaker 2: [thinking] 嗯...我想想看...
Speaker 1: [impatient] 快點啦！我好餓！
Speaker 2: [excited] 我知道了！吃火鍋！

重要規則：
- 對話要自然、口語化，像真人對話
- 情緒標籤要豐富多樣，幫助 TTS 表達情感
- 用繁體中文（台灣用語）
- 如果用戶提供場景或主題，據此創作
- 直接輸出對話稿，不要加額外的解釋或 markdown 格式
- 當用戶說「先不做回應」或「等待指令」時，簡短確認即可`;

async function sendChat() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return;

  const apiKey = getApiKey();
  if (!apiKey) return;

  input.value = '';
  input.style.height = 'auto';

  // Add user message
  chatHistory.push({ role: 'user', parts: [{ text: msg }] });
  appendChatMsg('user', msg);

  const sendBtn = document.getElementById('chatSendBtn');
  sendBtn.disabled = true;

  try {
    // Use Gemini for chat (non-TTS model)
    const chatModel = 'gemini-2.5-flash';
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${chatModel}:generateContent`;

    const requestBody = {
      systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] },
      contents: chatHistory,
      generationConfig: {
        temperature: 0.9,
        maxOutputTokens: 4096
      }
    };

    const response = await fetch(url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-goog-api-key': apiKey
      },
      body: JSON.stringify(requestBody)
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${response.status}`);
    }

    const data = await response.json();
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || '(無回應)';

    chatHistory.push({ role: 'model', parts: [{ text: reply }] });
    appendChatMsg('assistant', reply, hasDialogueFormat(reply));

  } catch (err) {
    appendChatMsg('system', `錯誤: ${err.message}`);
  } finally {
    sendBtn.disabled = false;
  }
}

function hasDialogueFormat(text) {
  // Check if text contains speaker dialogue format
  return /Speaker\s*[12]:/i.test(text) || /^.+?:\s*\[.+?\]/m.test(text);
}

function appendChatMsg(role, text, showApply = false) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `chat-msg ${role}`;

  // Simple formatting
  let html = escHtml(text);
  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Code blocks
  html = html.replace(/```([\s\S]*?)```/g, '<pre>$1</pre>');
  // Inline code
  html = html.replace(/`(.+?)`/g, '<code style="background:rgba(0,0,0,0.3);padding:1px 4px;border-radius:3px;">$1</code>');

  div.innerHTML = html;

  if (showApply && role === 'assistant') {
    const btn = document.createElement('button');
    btn.className = 'apply-btn';
    btn.innerHTML = '<span class="material-icons-round" style="font-size:14px;">arrow_forward</span> 套用到對話編輯器';
    btn.onclick = () => applyDialogue(text);
    div.appendChild(btn);
  }

  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function applyDialogue(text) {
  // Switch to multi tab + editor view
  switchTab('multi');
  if (currentView === 'script') switchView('editor');
  parseDialogueText(text);
  showToast('已套用對話稿到編輯器', 'success');
}

function clearChat() {
  chatHistory = [];
  document.getElementById('chatMessages').innerHTML = `
    <div class="chat-msg system">
      AI 對話稿助手 — 幫你產生適合 TTS 的雙人對話稿<br>
      輸入你的想法，AI 會生成符合格式的對話稿
    </div>
  `;
}

// ─── Toast ───
function showToast(msg, type = '') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; setTimeout(() => toast.remove(), 300); }, 3000);
}

// ─── Auto-resize chat input ───
const chatInputEl = document.getElementById('chatInput');
let isComposing = false;
chatInputEl.addEventListener('compositionstart', () => { isComposing = true; });
chatInputEl.addEventListener('compositionend', () => { isComposing = false; });
chatInputEl.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

function handleChatKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey && !isComposing) {
    e.preventDefault();
    sendChat();
  }
}
